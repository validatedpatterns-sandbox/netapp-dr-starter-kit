---
# =============================================================================
# Crossplane DR Setup Variables
# =============================================================================
#
# This file provides defaults for the Crossplane-based DR infrastructure.
# Values are auto-detected from the clusters when possible.
# Override any value via -e on the command line or by editing this file.
#
# Usage:
#   make crossplane-setup PROD_KUBECONFIG=~/prod-kubeconfig DR_KUBECONFIG=~/dr-kubeconfig
#
# =============================================================================

# -----------------------------------------------------------------------------
# Cluster Kubeconfigs (REQUIRED - pass via Make/command line)
# -----------------------------------------------------------------------------
# prod_kubeconfig: "/path/to/prod/kubeconfig"
# dr_kubeconfig: "/path/to/dr/kubeconfig"

# -----------------------------------------------------------------------------
# Cluster Overrides (optional - auto-detected from kubeconfigs if not set)
# -----------------------------------------------------------------------------
# prod_cluster_name_override: ""
# prod_region_override: ""
# prod_vpc_cidr_override: ""
# prod_vpc_name_override: ""

# dr_cluster_name_override: ""
# dr_region_override: ""
# dr_vpc_cidr_override: ""
# dr_vpc_name_override: ""

# -----------------------------------------------------------------------------
# FSx ONTAP Configuration
# -----------------------------------------------------------------------------
# File system names default to: <cluster_name>-<region>-fsx
# prod_file_system_name: ""
# dr_file_system_name: ""

fsx_storage_capacity: 1024
fsx_throughput_capacity: 1024
fsx_storage_type: "SSD"
fsx_deployment_type: "MULTI_AZ_1"

# SVM Configuration
# Production gets SVM1, DR gets SVM2 (set automatically by the playbook)

# -----------------------------------------------------------------------------
# S3 AppVault
# -----------------------------------------------------------------------------
# Bucket name and region are read from values-global.yaml automatically.
# Override here if needed:
# appvault_bucket_name: ""
# appvault_region: ""

# -----------------------------------------------------------------------------
# Route53 DR Failover
# -----------------------------------------------------------------------------
# Enabled by default. The failover domain is auto-derived from the production
# cluster's base domain:
#   primary.sandbox123.opentlc.com  →  dr.sandbox123.opentlc.com
#
# To use a custom domain, set dr_failover_domain below.
# Hosted zone for Crossplane Route53 records (no manual typing required by default):
#   - Leave dr_failover_hosted_zone_id empty; the playbook discovers Z... via AWS API
#     (aws CLI + credentials for the account that owns the zone).
#   - It tries the failover domain apex first, then (if the domain starts with dr.)
#     the parent apex (e.g. dr.aws.example.com -> aws.example.com).
#   - Optional override: dr_failover_hosted_zone_lookup_name if you need a specific apex.
#   - Optional explicit: dr_failover_hosted_zone_id when discovery cannot run (air-gapped).
# Disable parent fallback: -e dr_failover_discover_hosted_zone_parent=false
# To disable Route53 in this playbook: -e route53_failover_enabled=false
#
# dr_failover_domain: "dr.example.com"
# dr_failover_hosted_zone_id: ""
# dr_failover_discover_hosted_zone_id: true
# dr_failover_discover_hosted_zone_parent: true
# dr_failover_hosted_zone_lookup_name: "aws.validatedpatterns.io"

dr_failover_apps:
  - name: boutique
  - name: wordpress

dr_failover_health_check_path: "/"
# Route53: when false (default), secondary failover records have no health check so
# primary-down still resolves to DR even if HTTPS healthCheckPath is non-2xx on DR.
# Set true to require a healthy secondary probe before serving DR.
dr_failover_attach_secondary_health_check: false
# When true, crossplane-setup writes route53Failover.followPromotedDns.enabled (hub uses
# dr-dns-reconciler + DR S3 export instead of Crossplane failover records).
dr_follow_promoted_dns: true

# When true and dr_failover_hosted_zone_id is empty, crossplane-setup runs
# aws route53 list-hosted-zones-by-name (see comments above).
dr_failover_discover_hosted_zone_id: true

# When true, if the first lookup finds no zone and domain starts with dr., retry
# with the parent name (dr.aws.x -> aws.x).
dr_failover_discover_hosted_zone_parent: true

# -----------------------------------------------------------------------------
# VPC Peering
# -----------------------------------------------------------------------------
# Enabled automatically since prod and DR are in different regions/VPCs.
# Set to false to skip:
# vpc_peering_enabled: true
