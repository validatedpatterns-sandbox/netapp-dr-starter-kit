---
# =============================================================================
# DR Setup Variables
# =============================================================================
#
# This file provides defaults for the DR infrastructure setup.
# Values are auto-detected from the clusters when possible.
# Override any value via -e on the command line or by editing this file.
#
# The Terraform state bucket name is read from values-trident.yaml
# (.terraform.state.bucket) - edit it there.
#
# Usage:
#   make build-dr PROD_KUBECONFIG=~/prod-kubeconfig DR_KUBECONFIG=~/dr-kubeconfig
#
# =============================================================================

# -----------------------------------------------------------------------------
# Cluster Kubeconfigs (REQUIRED - pass via Make/command line)
# -----------------------------------------------------------------------------
# prod_kubeconfig: "/path/to/prod/kubeconfig"
# dr_kubeconfig: "/path/to/dr/kubeconfig"

# -----------------------------------------------------------------------------
# Cluster Overrides (optional - auto-detected from kubeconfigs if not set)
# -----------------------------------------------------------------------------
# These values are looked up from the clusters automatically:
#   - infrastructure/cluster .status.infrastructureName -> cluster name & VPC name
#   - infrastructure/cluster .status.platformStatus.aws.region -> region
#   - cm/cluster-config-v1 (kube-system) networking.machineNetwork[0].cidr -> VPC CIDR
#
# Set these to skip auto-detection:

# prod_cluster_name_override: ""
# prod_region_override: ""
# prod_vpc_cidr_override: ""
# prod_vpc_name_override: ""

# dr_cluster_name_override: ""
# dr_region_override: ""
# dr_vpc_cidr_override: ""
# dr_vpc_name_override: ""

# -----------------------------------------------------------------------------
# Terraform State Backend
# -----------------------------------------------------------------------------
# The S3 bucket name is read from values-trident.yaml (.terraform.state.bucket).
# The DynamoDB table and bucket are created automatically by the playbook.
terraform_state_dynamodb_table: "terraform-state-lock"

# -----------------------------------------------------------------------------
# FSx ONTAP Configuration
# -----------------------------------------------------------------------------
# File system names default to: <cluster_name>-<region>-fsx
# Override per cluster:
# prod_file_system_name: ""
# dr_file_system_name: ""

fsx_ontap_terraform_storage_capacity: 1024        # GiB (minimum 1024)
fsx_ontap_terraform_throughput_capacity: 1024      # MBps (128, 256, 512, 1024, 2048, 4096)
fsx_ontap_terraform_storage_type: "SSD"            # SSD or HDD
fsx_ontap_terraform_deployment_type: "MULTI_AZ_1"  # MULTI_AZ_1 or SINGLE_AZ_1
fsx_ontap_terraform_weekly_maintenance_time: "7:01:00"  # d:HH:MM (UTC)

# FSx passwords (read from ~/.fsx if not set)
# fsx_admin_password: ""
# svm_admin_password: ""

# SVM Configuration
# Production gets SVM1, DR gets SVM2. Distinct names are required so that
# ONTAP SnapMirror correctly resolves cross-cluster volume handles.
# SVM names are set per-cluster in dr-setup.yaml (not here, because
# extra-vars have the highest Ansible precedence and would override
# the per-cluster values in the playbook).
# fsx_ontap_terraform_svm_name: — set in dr-setup.yaml
fsx_ontap_terraform_root_volume_security_style: "UNIX"

# Secrets Manager
fsx_ontap_terraform_create_secrets: true

# -----------------------------------------------------------------------------
# Route53 DR Failover
# -----------------------------------------------------------------------------
# Set dr_failover_domain to enable Route53 DNS failover for protected apps.
# During failover, Route53 automatically routes traffic to the healthy cluster.
# Leave empty to skip Route53 setup entirely.
#
# If you own the zone in Route53, set dr_failover_hosted_zone_id to the Z...
# id, or use crossplane-setup discovery (dr_failover_discover_hosted_zone_id)
# — see ansible/crossplane-vars.yml. Otherwise a new zone may be created and
# you must delegate NS from the parent zone.
dr_failover_domain: ""
# dr_failover_hosted_zone_id: ""
# dr_failover_hosted_zone_lookup_name: "aws.validatedpatterns.io"

# Apps that get failover records (must match drFailover.apps in values-global.yaml)
dr_failover_apps:
  - name: boutique
  - name: wordpress

# Health check path hit by Route53 against each cluster's ingress router
dr_failover_health_check_path: "/"
# Route53 (Terraform dr-setup): omit secondary health check by default (same semantics as Crossplane).
dr_failover_attach_secondary_health_check: false

# -----------------------------------------------------------------------------
# Tags
# -----------------------------------------------------------------------------
resource_tags:
  Environment: "production"
  ManagedBy: "Terraform"
  Purpose: "NetApp-DR"
