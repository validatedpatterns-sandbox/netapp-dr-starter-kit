---
# fsx_ontap_terraform role
#
# Creates an FSx for NetApp ONTAP file system via Terraform.
# Expects fsx_ontap_terraform_cluster_info dict (from cluster_discovery role) and fsx_admin_password.
# Terraform runs inside a container (podman/docker).
#
# The file_system_name defaults to: <cluster_name>-<region>-fsx
#
# Modes:
#   fsx_ontap_terraform_prepare_only: false (default) - full lifecycle: setup, init, plan, apply, outputs
#   fsx_ontap_terraform_prepare_only: true            - setup, init, plan only; exports fsx_ontap_terraform_prepared fact
#                                                        for the caller to run apply in parallel

- name: "Compute file system name - {{ fsx_ontap_terraform_label }}"
  ansible.builtin.set_fact:
    fsx_ontap_terraform_file_system_name: >-
      {{ fsx_ontap_terraform_file_system_name_override | default('') | trim
         if (fsx_ontap_terraform_file_system_name_override | default('') | trim) != ''
         else (fsx_ontap_terraform_cluster_info.cluster_name ~ '-' ~ fsx_ontap_terraform_cluster_info.region ~ '-fsx') }}

- name: "Set working directory - {{ fsx_ontap_terraform_label }}"
  ansible.builtin.set_fact:
    fsx_ontap_terraform_workdir: "{{ fsx_ontap_terraform_workdir_base }}/{{ fsx_ontap_terraform_file_system_name }}"
    fsx_ontap_terraform_state_key: >-
      fsx-ontap/{{ fsx_ontap_terraform_cluster_info.cluster_name }}/{{ fsx_ontap_terraform_cluster_info.region }}/terraform.tfstate

- name: "Display configuration - {{ fsx_ontap_terraform_label }}"
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "FSx ONTAP Terraform - {{ fsx_ontap_terraform_label }}"
      - "=========================================="
      - "File System Name: {{ fsx_ontap_terraform_file_system_name }}"
      - "Region: {{ fsx_ontap_terraform_cluster_info.region }}"
      - "VPC ID: {{ fsx_ontap_terraform_cluster_info.vpc_id }}"
      - "Subnets: {{ fsx_ontap_terraform_cluster_info.subnet_ids[:2] }}"
      - "Route Tables: {{ fsx_ontap_terraform_cluster_info.route_table_ids }}"
      - >-
        Operation:
        {{ 'DESTROY' if (fsx_ontap_terraform_destroy | default(false)) else 'APPLY' }}
        {{ ' (prepare only)' if (fsx_ontap_terraform_prepare_only | default(false)) else '' }}
      - "Working Dir: {{ fsx_ontap_terraform_workdir }}"
      - "Container: {{ fsx_ontap_terraform_image }}"
      - "=========================================="

# Get AWS credentials (needed for both create and destroy, and for bucket check)
- name: "Get AWS credentials from boto3 session - {{ fsx_ontap_terraform_label }}"
  ansible.builtin.shell: |
    python3 -c "
    import json, boto3
    creds = boto3.Session().get_credentials().get_frozen_credentials()
    print(json.dumps({'ak': creds.access_key, 'sk': creds.secret_key, 'st': creds.token or ''}))
    "
  register: fsx_ontap_terraform_boto3_creds
  changed_when: false

- name: "Set AWS credentials - {{ fsx_ontap_terraform_label }}"
  ansible.builtin.set_fact:
    fsx_ontap_terraform_aws_creds: "{{ fsx_ontap_terraform_boto3_creds.stdout | from_json }}"
    fsx_ontap_terraform_aws_env:
      AWS_ACCESS_KEY_ID: "{{ (fsx_ontap_terraform_boto3_creds.stdout | from_json).ak }}"
      AWS_SECRET_ACCESS_KEY: "{{ (fsx_ontap_terraform_boto3_creds.stdout | from_json).sk }}"
      AWS_SESSION_TOKEN: "{{ (fsx_ontap_terraform_boto3_creds.stdout | from_json).st }}"
      AWS_REGION: "{{ fsx_ontap_terraform_state_region | default(fsx_ontap_terraform_cluster_info.region) }}"
      AWS_DEFAULT_REGION: "{{ fsx_ontap_terraform_state_region | default(fsx_ontap_terraform_cluster_info.region) }}"

# ---------------------------------------------------------------------------
# Pre-flight: verify the S3 state bucket exists before running terraform.
# ---------------------------------------------------------------------------
- name: "Check if S3 state bucket exists - {{ fsx_ontap_terraform_label }}"
  ansible.builtin.shell: >-
    aws s3api head-bucket --bucket {{ fsx_ontap_terraform_state_bucket }} 2>/dev/null
    && echo "exists" || echo "missing"
  register: fsx_ontap_terraform_bucket_check
  changed_when: false
  environment: "{{ fsx_ontap_terraform_aws_env }}"
  when: fsx_ontap_terraform_state_bucket | default('') | length > 0

- name: "Set state bucket availability flag - {{ fsx_ontap_terraform_label }}"
  ansible.builtin.set_fact:
    fsx_ontap_terraform_bucket_available: >-
      {{ (fsx_ontap_terraform_state_bucket | default('') | length > 0) and
         (fsx_ontap_terraform_bucket_check.stdout | default('missing') is search('exists')) }}

- name: "Skip - S3 state bucket does not exist - {{ fsx_ontap_terraform_label }}"
  ansible.builtin.debug:
    msg:
      - "S3 state bucket '{{ fsx_ontap_terraform_state_bucket }}' does not exist."
      - "Skipping {{ 'destroy' if (fsx_ontap_terraform_destroy | default(false)) else 'apply' }} for {{ fsx_ontap_terraform_file_system_name }}."
      - "If you need to clean up orphaned resources, do so manually in the AWS console."
  when: not fsx_ontap_terraform_bucket_available and (fsx_ontap_terraform_state_bucket | default('') | length > 0)

# Set skipped prepared fact when bucket is missing (so callers don't fail)
- name: "Set skipped prepared fact - {{ fsx_ontap_terraform_label }}"
  ansible.builtin.set_fact:
    fsx_ontap_terraform_prepared:
      skipped: true
      file_system_name: "{{ fsx_ontap_terraform_file_system_name }}"
      label: "{{ fsx_ontap_terraform_label }}"
  when:
    - fsx_ontap_terraform_prepare_only | default(false)
    - not fsx_ontap_terraform_bucket_available
    - fsx_ontap_terraform_state_bucket | default('') | length > 0

# ---------------------------------------------------------------------------
# Common setup (runs for both create and destroy when state bucket is available)
# ---------------------------------------------------------------------------
- name: "Setup terraform workspace - {{ fsx_ontap_terraform_label }}"
  when: fsx_ontap_terraform_bucket_available or (fsx_ontap_terraform_state_bucket | default('') | length == 0)
  block:
    - name: "Create terraform working directory - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.file:
        path: "{{ fsx_ontap_terraform_workdir }}"
        state: directory
        mode: '0755'

    - name: "Copy terraform files to working directory - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.copy:
        src: "{{ fsx_ontap_terraform_tf_source }}/{{ item }}"
        dest: "{{ fsx_ontap_terraform_workdir }}/{{ item }}"
        mode: '0644'
      loop:
        - main.tf
        - variables.tf
        - outputs.tf
        - providers.tf

    - name: "Check if S3 backend is configured - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.set_fact:
        fsx_ontap_terraform_use_s3_backend: "{{ fsx_ontap_terraform_state_bucket | default('') | length > 0 }}"

    - name: "Generate backend.tf for S3 state - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.template:
        src: backend.tf.j2
        dest: "{{ fsx_ontap_terraform_workdir }}/backend.tf"
        mode: '0644'
      when: fsx_ontap_terraform_use_s3_backend

    - name: "Remove backend.tf if not using S3 - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.file:
        path: "{{ fsx_ontap_terraform_workdir }}/backend.tf"
        state: absent
      when: not fsx_ontap_terraform_use_s3_backend

    - name: "Generate terraform.tfvars - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.template:
        src: terraform.tfvars.j2
        dest: "{{ fsx_ontap_terraform_workdir }}/terraform.tfvars"
        mode: '0600'

    # Build the container terraform command prefix
    - name: "Build terraform container command - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.set_fact:
        fsx_ontap_terraform_tf_cmd: >-
          {{ fsx_ontap_terraform_container_runtime }} run --rm
          -v {{ fsx_ontap_terraform_workdir }}:/workspace:Z
          -w /workspace
          -e AWS_ACCESS_KEY_ID={{ fsx_ontap_terraform_aws_creds.ak }}
          -e AWS_SECRET_ACCESS_KEY={{ fsx_ontap_terraform_aws_creds.sk }}
          {% if fsx_ontap_terraform_aws_creds.st %}-e AWS_SESSION_TOKEN={{ fsx_ontap_terraform_aws_creds.st }}{% endif %}
          -e AWS_REGION={{ fsx_ontap_terraform_cluster_info.region }}
          -e AWS_DEFAULT_REGION={{ fsx_ontap_terraform_cluster_info.region }}
          {{ fsx_ontap_terraform_image }}

    - name: "Initialize Terraform - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.command:
        argv:
          - bash
          - -c
          - "{{ fsx_ontap_terraform_tf_cmd }} terraform init -upgrade -reconfigure -no-color"
      register: fsx_ontap_terraform_tf_init
      changed_when: "'Terraform has been successfully initialized' in fsx_ontap_terraform_tf_init.stdout"

    # -----------------------------------------------------------------
    # Idempotency: import / clean up resources that exist in AWS but
    # are not in terraform state (e.g. from a previous partial run or
    # after the state bucket was recreated).
    #
    # Strategy:
    #   SG       – import it, then revoke all its rules so Terraform
    #              can (re)create them cleanly.
    #   Secrets  – import the secret; Terraform will push a new
    #              version during apply.
    #   FSx / SVM – import if found (long-lived, expensive resources).
    # -----------------------------------------------------------------
    - name: "Check terraform state - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.shell: "{{ fsx_ontap_terraform_tf_cmd }} terraform state list 2>/dev/null"
      register: fsx_ontap_terraform_tf_state_list
      changed_when: false
      failed_when: false

    - name: "Check for existing resources to import - {{ fsx_ontap_terraform_label }}"
      when: "'aws_security_group.fsx_ontap' not in (fsx_ontap_terraform_tf_state_list.stdout | default(''))"
      block:
        # ---- Look up existing AWS resources ---------------------
        - name: "Look up existing security group - {{ fsx_ontap_terraform_label }}"
          ansible.builtin.command:
            argv:
              - aws
              - ec2
              - describe-security-groups
              - --filters
              - "Name=group-name,Values={{ fsx_ontap_terraform_file_system_name }}-sg"
              - "Name=vpc-id,Values={{ fsx_ontap_terraform_cluster_info.vpc_id }}"
              - --query
              - 'SecurityGroups[0].GroupId'
              - --output
              - text
              - --region
              - "{{ fsx_ontap_terraform_cluster_info.region }}"
          environment: "{{ fsx_ontap_terraform_aws_env }}"
          register: fsx_ontap_terraform_existing_sg
          changed_when: false
          failed_when: false

        - name: "Look up existing FSx admin secret - {{ fsx_ontap_terraform_label }}"
          ansible.builtin.command:
            argv:
              - aws
              - secretsmanager
              - describe-secret
              - --secret-id
              - "{{ fsx_ontap_terraform_file_system_name }}-FsxAdminPassword"
              - --query
              - 'ARN'
              - --output
              - text
              - --region
              - "{{ fsx_ontap_terraform_cluster_info.region }}"
          environment: "{{ fsx_ontap_terraform_aws_env }}"
          register: fsx_ontap_terraform_existing_fsx_secret
          changed_when: false
          failed_when: false

        - name: "Look up existing SVM admin secret - {{ fsx_ontap_terraform_label }}"
          ansible.builtin.command:
            argv:
              - aws
              - secretsmanager
              - describe-secret
              - --secret-id
              - "{{ fsx_ontap_terraform_file_system_name }}-SVMAdminPassword"
              - --query
              - 'ARN'
              - --output
              - text
              - --region
              - "{{ fsx_ontap_terraform_cluster_info.region }}"
          environment: "{{ fsx_ontap_terraform_aws_env }}"
          register: fsx_ontap_terraform_existing_svm_secret
          changed_when: false
          failed_when: false

        - name: "Look up existing FSx filesystem - {{ fsx_ontap_terraform_label }}"
          ansible.builtin.command:
            argv:
              - aws
              - fsx
              - describe-file-systems
              - --query
              - "FileSystems[?Tags[?Key=='Name'&&Value=='{{ fsx_ontap_terraform_file_system_name }}']].FileSystemId | [0]"
              - --output
              - text
              - --region
              - "{{ fsx_ontap_terraform_cluster_info.region }}"
          environment: "{{ fsx_ontap_terraform_aws_env }}"
          register: fsx_ontap_terraform_existing_fsx
          changed_when: false
          failed_when: false

        - name: "Look up existing SVM - {{ fsx_ontap_terraform_label }}"
          ansible.builtin.command:
            argv:
              - aws
              - fsx
              - describe-storage-virtual-machines
              - --query
              - "StorageVirtualMachines[?FileSystemId=='{{ fsx_ontap_terraform_existing_fsx.stdout | trim }}'].StorageVirtualMachineId | [0]"
              - --output
              - text
              - --region
              - "{{ fsx_ontap_terraform_cluster_info.region }}"
          environment: "{{ fsx_ontap_terraform_aws_env }}"
          register: fsx_ontap_terraform_existing_svm
          changed_when: false
          failed_when: false
          when: fsx_ontap_terraform_existing_fsx.rc == 0 and fsx_ontap_terraform_existing_fsx.stdout | trim not in ['None', '']

        # ---- Build and run import script -------------------------
        - name: "Set import flags - {{ fsx_ontap_terraform_label }}"
          ansible.builtin.set_fact:
            fsx_ontap_terraform_sg_exists: >-
              {{ fsx_ontap_terraform_existing_sg.rc == 0 and
                 fsx_ontap_terraform_existing_sg.stdout | trim not in ['None', ''] }}
            fsx_ontap_terraform_fsx_secret_exists: >-
              {{ fsx_ontap_terraform_existing_fsx_secret.rc == 0 and
                 fsx_ontap_terraform_existing_fsx_secret.stdout | trim not in ['None', ''] }}
            fsx_ontap_terraform_svm_secret_exists: >-
              {{ fsx_ontap_terraform_existing_svm_secret.rc == 0 and
                 fsx_ontap_terraform_existing_svm_secret.stdout | trim not in ['None', ''] }}
            fsx_ontap_terraform_fsx_exists: >-
              {{ fsx_ontap_terraform_existing_fsx.rc | default(1) == 0 and
                 fsx_ontap_terraform_existing_fsx.stdout | default('None') | trim not in ['None', ''] }}
            fsx_ontap_terraform_svm_exists: >-
              {{ fsx_ontap_terraform_existing_svm.rc | default(1) == 0 and
                 fsx_ontap_terraform_existing_svm.stdout | default('None') | trim not in ['None', ''] }}

        - name: "Generate import script - {{ fsx_ontap_terraform_label }}"
          ansible.builtin.copy:
            dest: "{{ fsx_ontap_terraform_workdir }}/import.sh"
            mode: '0755'
            content: |
              #!/bin/sh
              set -e
              {% if fsx_ontap_terraform_sg_exists | bool %}
              echo "=== Importing security group {{ fsx_ontap_terraform_existing_sg.stdout | trim }} ==="
              terraform import -no-color aws_security_group.fsx_ontap {{ fsx_ontap_terraform_existing_sg.stdout | trim }} || true
              {% endif %}
              {% if fsx_ontap_terraform_fsx_secret_exists | bool %}
              echo "=== Importing FSx admin secret ==="
              terraform import -no-color 'aws_secretsmanager_secret.fsx_admin[0]' '{{ fsx_ontap_terraform_existing_fsx_secret.stdout | trim }}' || true
              {% endif %}
              {% if fsx_ontap_terraform_svm_secret_exists | bool %}
              echo "=== Importing SVM admin secret ==="
              terraform import -no-color 'aws_secretsmanager_secret.svm_admin[0]' '{{ fsx_ontap_terraform_existing_svm_secret.stdout | trim }}' || true
              {% endif %}
              {% if fsx_ontap_terraform_fsx_exists | bool %}
              echo "=== Importing FSx filesystem {{ fsx_ontap_terraform_existing_fsx.stdout | trim }} ==="
              terraform import -no-color aws_fsx_ontap_file_system.this {{ fsx_ontap_terraform_existing_fsx.stdout | trim }} || true
              {% endif %}
              {% if fsx_ontap_terraform_svm_exists | bool %}
              echo "=== Importing SVM {{ fsx_ontap_terraform_existing_svm.stdout | trim }} ==="
              terraform import -no-color aws_fsx_ontap_storage_virtual_machine.this {{ fsx_ontap_terraform_existing_svm.stdout | trim }} || true
              {% endif %}
              echo "=== FSx import complete ==="
          when: >-
            (fsx_ontap_terraform_sg_exists | bool) or
            (fsx_ontap_terraform_fsx_secret_exists | bool) or
            (fsx_ontap_terraform_svm_secret_exists | bool) or
            (fsx_ontap_terraform_fsx_exists | bool)

        - name: "Run import script - {{ fsx_ontap_terraform_label }}"
          ansible.builtin.command:
            argv:
              - bash
              - -c
              - "{{ fsx_ontap_terraform_tf_cmd }} sh /workspace/import.sh"
          register: fsx_ontap_terraform_import_result
          changed_when: true
          when: >-
            (fsx_ontap_terraform_sg_exists | bool) or
            (fsx_ontap_terraform_fsx_secret_exists | bool) or
            (fsx_ontap_terraform_svm_secret_exists | bool) or
            (fsx_ontap_terraform_fsx_exists | bool)

        - name: "Display import results - {{ fsx_ontap_terraform_label }}"
          ansible.builtin.debug:
            msg: "{{ fsx_ontap_terraform_import_result.stdout_lines | default(['No imports needed']) }}"
          when: fsx_ontap_terraform_import_result is defined

        - name: "Clean up import script - {{ fsx_ontap_terraform_label }}"
          ansible.builtin.file:
            path: "{{ fsx_ontap_terraform_workdir }}/import.sh"
            state: absent

        # ---- Delete orphaned SG rules so Terraform can recreate them ----
        # (SG rules are separate terraform resources; importing the SG
        #  does NOT import its rules. Deleting them avoids "Duplicate" errors.)
        - name: "Get all existing SG rule IDs - {{ fsx_ontap_terraform_label }}"
          ansible.builtin.command:
            argv:
              - aws
              - ec2
              - describe-security-group-rules
              - --filters
              - "Name=group-id,Values={{ fsx_ontap_terraform_existing_sg.stdout | trim }}"
              - --query
              - 'SecurityGroupRules[].{Id:SecurityGroupRuleId,IsEgress:IsEgress}'
              - --output
              - json
              - --region
              - "{{ fsx_ontap_terraform_cluster_info.region }}"
          environment: "{{ fsx_ontap_terraform_aws_env }}"
          register: fsx_ontap_terraform_sg_rules_raw
          changed_when: false
          failed_when: false
          when: fsx_ontap_terraform_sg_exists | bool

        - name: "Parse SG rules - {{ fsx_ontap_terraform_label }}"
          ansible.builtin.set_fact:
            fsx_ontap_terraform_sg_ingress_rule_ids: >-
              {{ (fsx_ontap_terraform_sg_rules_raw.stdout | default('[]') | from_json)
                 | rejectattr('IsEgress') | map(attribute='Id') | list }}
            fsx_ontap_terraform_sg_egress_rule_ids: >-
              {{ (fsx_ontap_terraform_sg_rules_raw.stdout | default('[]') | from_json)
                 | selectattr('IsEgress') | map(attribute='Id') | list }}
          when: fsx_ontap_terraform_sg_exists | bool

        - name: "Revoke orphaned ingress rules - {{ fsx_ontap_terraform_label }}"
          ansible.builtin.command:
            argv:
              - aws
              - ec2
              - revoke-security-group-ingress
              - --group-id
              - "{{ fsx_ontap_terraform_existing_sg.stdout | trim }}"
              - --security-group-rule-ids
              - "{{ fsx_ontap_terraform_sg_ingress_rule_ids | join(' ') }}"
              - --region
              - "{{ fsx_ontap_terraform_cluster_info.region }}"
          environment: "{{ fsx_ontap_terraform_aws_env }}"
          failed_when: false
          changed_when: true
          when:
            - fsx_ontap_terraform_sg_exists | bool
            - (fsx_ontap_terraform_sg_ingress_rule_ids | default([]) | length) > 0

        - name: "Revoke orphaned egress rules - {{ fsx_ontap_terraform_label }}"
          ansible.builtin.command:
            argv:
              - aws
              - ec2
              - revoke-security-group-egress
              - --group-id
              - "{{ fsx_ontap_terraform_existing_sg.stdout | trim }}"
              - --security-group-rule-ids
              - "{{ fsx_ontap_terraform_sg_egress_rule_ids | join(' ') }}"
              - --region
              - "{{ fsx_ontap_terraform_cluster_info.region }}"
          environment: "{{ fsx_ontap_terraform_aws_env }}"
          failed_when: false
          changed_when: true
          when:
            - fsx_ontap_terraform_sg_exists | bool
            - (fsx_ontap_terraform_sg_egress_rule_ids | default([]) | length) > 0

        # Secrets are imported (not deleted). Terraform's PutSecretValue for
        # aws_secretsmanager_secret_version will create a new version, which
        # works even when a version already exists.

# ---------------------------------------------------------------------------
# Create: Plan phase (runs in both normal and prepare_only mode)
# ---------------------------------------------------------------------------
- name: "Terraform plan - {{ fsx_ontap_terraform_label }}"
  ansible.builtin.command:
    argv:
      - bash
      - -c
      - "{{ fsx_ontap_terraform_tf_cmd }} terraform plan -out=tfplan -input=false -no-color"
  register: fsx_ontap_terraform_tf_plan
  changed_when: false
  when:
    - not (fsx_ontap_terraform_destroy | default(false))
    - fsx_ontap_terraform_bucket_available or (fsx_ontap_terraform_state_bucket | default('') | length == 0)

# ---------------------------------------------------------------------------
# Destroy: Clean up non-root volumes before destroying FSx resources.
# Volumes created by Trident or SnapMirror are not managed by Terraform,
# and AWS will refuse to delete the SVM while they exist.
# ---------------------------------------------------------------------------
- name: "Delete non-root ONTAP volumes before destroy - {{ fsx_ontap_terraform_label }}"
  when:
    - fsx_ontap_terraform_destroy | default(false)
    - fsx_ontap_terraform_bucket_available or (fsx_ontap_terraform_state_bucket | default('') | length == 0)
  block:
    - name: "Look up filesystem ID - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.command:
        argv:
          - aws
          - fsx
          - describe-file-systems
          - --query
          - "FileSystems[?Tags[?Key=='Name'&&Value=='{{ fsx_ontap_terraform_file_system_name }}']].FileSystemId | [0]"
          - --output
          - text
          - --region
          - "{{ fsx_ontap_terraform_cluster_info.region }}"
      environment: "{{ fsx_ontap_terraform_aws_env }}"
      register: fsx_ontap_terraform_destroy_fs_id
      changed_when: false
      failed_when: false

    - name: "List non-root volumes (any lifecycle state) - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.shell: >-
        aws fsx describe-volumes
        --filters Name=file-system-id,Values={{ fsx_ontap_terraform_destroy_fs_id.stdout | trim }}
        --query 'Volumes[?OntapConfiguration.StorageVirtualMachineRoot!=`true`].{Id:VolumeId,State:Lifecycle}'
        --output json
        --region {{ fsx_ontap_terraform_cluster_info.region }}
      environment: "{{ fsx_ontap_terraform_aws_env }}"
      register: fsx_ontap_terraform_nonroot_vols
      changed_when: false
      failed_when: false
      when: fsx_ontap_terraform_destroy_fs_id.stdout | default('') | trim not in ['', 'None']

    - name: "Set all non-root volumes - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.set_fact:
        fsx_ontap_terraform_all_nonroot: "{{ (fsx_ontap_terraform_nonroot_vols | default({'stdout': '[]'})).stdout | default('[]') | from_json | default([]) }}"

    - name: "Set deletable volume list - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.set_fact:
        fsx_ontap_terraform_volumes_to_delete: "{{ fsx_ontap_terraform_all_nonroot | rejectattr('State', 'equalto', 'DELETING') | map(attribute='Id') | list }}"

    - name: "Display volumes found - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.debug:
        msg:
          - "Filesystem: {{ fsx_ontap_terraform_destroy_fs_id.stdout | default('') | trim }}"
          - "Non-root volumes: {{ fsx_ontap_terraform_all_nonroot }}"
          - "Will attempt to delete: {{ fsx_ontap_terraform_volumes_to_delete }}"
      when: (fsx_ontap_terraform_all_nonroot | length) > 0

    - name: "Delete non-root volumes via AWS API - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.command:
        argv:
          - aws
          - fsx
          - delete-volume
          - --volume-id
          - "{{ item }}"
          - --ontap-configuration
          - '{"SkipFinalBackup":true}'
          - --region
          - "{{ fsx_ontap_terraform_cluster_info.region }}"
      environment: "{{ fsx_ontap_terraform_aws_env }}"
      loop: "{{ fsx_ontap_terraform_volumes_to_delete }}"
      register: fsx_ontap_terraform_vol_delete
      failed_when: false
      changed_when: true
      when: (fsx_ontap_terraform_volumes_to_delete | length) > 0

    - name: "Display volume delete results - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.debug:
        msg: >-
          {{ item.item }}: rc={{ item.rc }}
          {{ (item.stderr | default('')) if item.rc != 0 else 'OK' }}
      loop: "{{ fsx_ontap_terraform_vol_delete.results | default([]) }}"
      loop_control:
        label: "{{ item.item | default('') }}"
      when: fsx_ontap_terraform_vol_delete.results is defined

    - name: "Wait for volume deletion (max 10 min) - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.shell: >-
        aws fsx describe-volumes
        --filters Name=file-system-id,Values={{ fsx_ontap_terraform_destroy_fs_id.stdout | trim }}
        --query 'Volumes[?OntapConfiguration.StorageVirtualMachineRoot!=`true`].VolumeId'
        --output json
        --region {{ fsx_ontap_terraform_cluster_info.region }}
      environment: "{{ fsx_ontap_terraform_aws_env }}"
      register: fsx_ontap_terraform_remaining_vols
      until: (fsx_ontap_terraform_remaining_vols.stdout | default('[]') | from_json | length) == 0
      retries: 40
      delay: 15
      changed_when: false
      failed_when: false
      when: (fsx_ontap_terraform_all_nonroot | length) > 0

    - name: "Volume cleanup complete - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.debug:
        msg: "All non-root volumes deleted for {{ fsx_ontap_terraform_file_system_name }}"
      when: (fsx_ontap_terraform_all_nonroot | length) > 0

# ---------------------------------------------------------------------------
# Destroy: Ensure the SVM is in Terraform state.  A prior run may have
# removed it (state rm) or state may have drifted.  Without the SVM in
# state, Terraform tries to delete the filesystem first and AWS rejects
# that while SVMs still exist.
# ---------------------------------------------------------------------------
- name: "Ensure SVM is in Terraform state for destroy - {{ fsx_ontap_terraform_label }}"
  when:
    - fsx_ontap_terraform_destroy | default(false)
    - fsx_ontap_terraform_bucket_available or (fsx_ontap_terraform_state_bucket | default('') | length == 0)
  block:
    - name: "Check if SVM is in Terraform state - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.shell: "{{ fsx_ontap_terraform_tf_cmd }} terraform state list 2>/dev/null"
      register: fsx_ontap_terraform_pre_destroy_state
      changed_when: false
      failed_when: false

    - name: "Look up SVM by filesystem name - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.shell: |
        set -o pipefail
        FS_ID=$(aws fsx describe-file-systems \
          --query "FileSystems[?Tags[?Key=='Name'&&Value=='{{ fsx_ontap_terraform_file_system_name }}']].FileSystemId | [0]" \
          --output text --region {{ fsx_ontap_terraform_cluster_info.region }})
        if [ -n "${FS_ID}" ] && [ "${FS_ID}" != "None" ]; then
          aws fsx describe-storage-virtual-machines \
            --query "StorageVirtualMachines[?FileSystemId=='${FS_ID}'].StorageVirtualMachineId | [0]" \
            --output text --region {{ fsx_ontap_terraform_cluster_info.region }}
        fi
      environment: "{{ fsx_ontap_terraform_aws_env }}"
      register: fsx_ontap_terraform_svm_lookup
      changed_when: false
      failed_when: false
      when: "'aws_fsx_ontap_storage_virtual_machine.this' not in (fsx_ontap_terraform_pre_destroy_state.stdout | default(''))"

    - name: "Re-import SVM into Terraform state - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.command:
        argv:
          - bash
          - -c
          - >-
            {{ fsx_ontap_terraform_tf_cmd }} terraform import -no-color
            aws_fsx_ontap_storage_virtual_machine.this
            {{ fsx_ontap_terraform_svm_lookup.stdout | trim }}
      changed_when: true
      when:
        - "'aws_fsx_ontap_storage_virtual_machine.this' not in (fsx_ontap_terraform_pre_destroy_state.stdout | default(''))"
        - fsx_ontap_terraform_svm_lookup.stdout | default('') | trim not in ['', 'None']

    - name: "SVM re-import status - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.debug:
        msg: >-
          {{ 'SVM re-imported: ' ~ (fsx_ontap_terraform_svm_lookup.stdout | default('') | trim)
             if ('aws_fsx_ontap_storage_virtual_machine.this' not in (fsx_ontap_terraform_pre_destroy_state.stdout | default('')))
             else 'SVM already in state' }}

# ---------------------------------------------------------------------------
# Destroy: Plan phase (runs in both normal and prepare_only mode)
#
# A previous async apply that was interrupted (e.g. its container was killed)
# can leave a stale DynamoDB lock.  We detect that, force-unlock, and retry.
# ---------------------------------------------------------------------------
- name: "Terraform destroy plan - {{ fsx_ontap_terraform_label }}"
  when:
    - fsx_ontap_terraform_destroy | default(false)
    - fsx_ontap_terraform_bucket_available or (fsx_ontap_terraform_state_bucket | default('') | length == 0)
  block:
    - name: "Terraform destroy plan (attempt) - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.command:
        argv:
          - bash
          - -c
          - "{{ fsx_ontap_terraform_tf_cmd }} terraform plan -destroy -out=tfplan-destroy -input=false -no-color"
      register: fsx_ontap_terraform_destroy_plan_result
      failed_when: false
      changed_when: false

    - name: "Extract stale lock ID - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.set_fact:
        fsx_ontap_terraform_stale_lock_id: "{{ fsx_ontap_terraform_destroy_plan_result.stderr | regex_search('ID:\\s+([0-9a-f-]+)', '\\1') | first }}"
      when:
        - fsx_ontap_terraform_destroy_plan_result.rc != 0
        - "'Error acquiring the state lock' in fsx_ontap_terraform_destroy_plan_result.stderr"
      failed_when: false

    - name: "Force-unlock stale state lock - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.command:
        argv:
          - bash
          - -c
          - "{{ fsx_ontap_terraform_tf_cmd }} terraform force-unlock -force {{ fsx_ontap_terraform_stale_lock_id }}"
      changed_when: true
      when: fsx_ontap_terraform_stale_lock_id | default('') | length > 0

    - name: "Terraform destroy plan (retry after unlock) - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.command:
        argv:
          - bash
          - -c
          - "{{ fsx_ontap_terraform_tf_cmd }} terraform plan -destroy -out=tfplan-destroy -input=false -no-color"
      changed_when: false
      when: fsx_ontap_terraform_stale_lock_id | default('') | length > 0

    - name: "Fail if destroy plan failed for non-lock reason - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.fail:
        msg: "{{ fsx_ontap_terraform_destroy_plan_result.stderr }}"
      when:
        - fsx_ontap_terraform_destroy_plan_result.rc != 0
        - fsx_ontap_terraform_stale_lock_id | default('') | length == 0

# ---------------------------------------------------------------------------
# Prepare-only mode: export everything needed for the caller to run apply
# ---------------------------------------------------------------------------
- name: "Export prepared state for parallel apply - {{ fsx_ontap_terraform_label }}"
  ansible.builtin.set_fact:
    fsx_ontap_terraform_prepared:
      skipped: false
      tf_cmd: "{{ fsx_ontap_terraform_tf_cmd }}"
      workdir: "{{ fsx_ontap_terraform_workdir }}"
      file_system_name: "{{ fsx_ontap_terraform_file_system_name }}"
      label: "{{ fsx_ontap_terraform_label }}"
      apply_cmd: >-
        {{ fsx_ontap_terraform_tf_cmd }} terraform apply -auto-approve -no-color
        {{ 'tfplan-destroy' if (fsx_ontap_terraform_destroy | default(false)) else 'tfplan' }}
      output_cmd: "{{ fsx_ontap_terraform_tf_cmd }} terraform output -json -no-color"
      is_destroy: "{{ fsx_ontap_terraform_destroy | default(false) }}"
  when:
    - fsx_ontap_terraform_prepare_only | default(false)
    - fsx_ontap_terraform_bucket_available or (fsx_ontap_terraform_state_bucket | default('') | length == 0)

# ---------------------------------------------------------------------------
# Full mode: Apply (only when not prepare_only)
# ---------------------------------------------------------------------------
- name: "Apply terraform - {{ fsx_ontap_terraform_label }}"
  when:
    - not (fsx_ontap_terraform_prepare_only | default(false))
    - not (fsx_ontap_terraform_destroy | default(false))
    - fsx_ontap_terraform_bucket_available or (fsx_ontap_terraform_state_bucket | default('') | length == 0)
  block:
    - name: "Terraform apply - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.command:
        argv:
          - bash
          - -c
          - "{{ fsx_ontap_terraform_tf_cmd }} terraform apply -auto-approve -no-color tfplan"
      register: fsx_ontap_terraform_apply_result
      changed_when: true

    - name: "Get Terraform outputs - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.command:
        argv:
          - bash
          - -c
          - "{{ fsx_ontap_terraform_tf_cmd }} terraform output -json -no-color"
      register: fsx_ontap_terraform_outputs_raw
      changed_when: false

    - name: "Parse Terraform outputs - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.set_fact:
        fsx_ontap_terraform_outputs: "{{ fsx_ontap_terraform_outputs_raw.stdout | from_json }}"
      when: fsx_ontap_terraform_outputs_raw.stdout is defined

    - name: "Set output facts - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.set_fact:
        fsx_ontap_terraform_result:
          file_system_id: "{{ fsx_ontap_terraform_outputs.file_system_id.value }}"
          file_system_dns_name: "{{ fsx_ontap_terraform_outputs.file_system_dns_name.value }}"
          svm_id: "{{ fsx_ontap_terraform_outputs.svm_id.value }}"
          svm_name: "{{ fsx_ontap_terraform_outputs.svm_name.value }}"
          svm_mgmt_dns_name: "{{ fsx_ontap_terraform_outputs.svm_management_endpoint_dns_name.value | default('') }}"
          intercluster_dns_name: "{{ fsx_ontap_terraform_outputs.intercluster_endpoint_dns_name.value | default('') }}"
          intercluster_ips: "{{ fsx_ontap_terraform_outputs.intercluster_endpoint_ip_addresses.value | default([]) }}"
          security_group_id: "{{ fsx_ontap_terraform_outputs.security_group_id.value }}"
          file_system_name: "{{ fsx_ontap_terraform_file_system_name }}"
      when: fsx_ontap_terraform_outputs is defined

    - name: "Display Output Summary - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "FSx for ONTAP Deployment Complete"
          - "=========================================="
          - "File System Name: {{ fsx_ontap_terraform_result.file_system_name }}"
          - "File System ID: {{ fsx_ontap_terraform_result.file_system_id }}"
          - "File System DNS: {{ fsx_ontap_terraform_result.file_system_dns_name }}"
          - "SVM ID: {{ fsx_ontap_terraform_result.svm_id }}"
          - "SVM Name: {{ fsx_ontap_terraform_result.svm_name }}"
          - "SVM Management DNS: {{ fsx_ontap_terraform_result.svm_mgmt_dns_name }}"
          - "Intercluster DNS: {{ fsx_ontap_terraform_result.intercluster_dns_name }}"
          - "Intercluster IPs: {{ fsx_ontap_terraform_result.intercluster_ips }}"
          - "Security Group ID: {{ fsx_ontap_terraform_result.security_group_id }}"
          - "=========================================="
      when: fsx_ontap_terraform_result is defined

# ---------------------------------------------------------------------------
# Full mode: Destroy (only when not prepare_only)
# ---------------------------------------------------------------------------
- name: "Destroy terraform resources - {{ fsx_ontap_terraform_label }}"
  when:
    - not (fsx_ontap_terraform_prepare_only | default(false))
    - fsx_ontap_terraform_destroy | default(false)
    - fsx_ontap_terraform_bucket_available or (fsx_ontap_terraform_state_bucket | default('') | length == 0)
  block:
    - name: "Terraform destroy - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.command:
        argv:
          - bash
          - -c
          - "{{ fsx_ontap_terraform_tf_cmd }} terraform apply -auto-approve -no-color tfplan-destroy"
      changed_when: true

    - name: "Display destroy completion - {{ fsx_ontap_terraform_label }}"
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "FSx for ONTAP Resources Destroyed: {{ fsx_ontap_terraform_file_system_name }}"
          - "=========================================="
