---
# cluster_discovery role
#
# Queries a cluster via kubeconfig to discover:
#   - Cluster infrastructure name (from infrastructure/cluster)
#   - AWS region
#   - VPC CIDR (from cm/cluster-config-v1 in kube-system)
#   - Whether the cluster is HCP (Hosted Control Plane)
#
# All values can be overridden with *_override variables (set to non-empty string).
# Results are stored in the cluster_discovery_result dict.

- name: Determine what needs to be looked up - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_need_infra_lookup: >-
      {{ (cluster_discovery_name_override | default('') | trim) == '' or
         (cluster_discovery_region_override | default('') | trim) == '' }}
    cluster_discovery_need_cidr_lookup: "{{ (cluster_discovery_vpc_cidr_override | default('') | trim) == '' }}"

- name: Get infrastructure info from cluster - {{ cluster_discovery_label }}
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: Infrastructure
    name: cluster
    kubeconfig: "{{ cluster_discovery_kubeconfig }}"
  register: cluster_discovery_infra_info
  when: cluster_discovery_need_infra_lookup | bool

- name: Get cluster-config-v1 configmap - {{ cluster_discovery_label }}
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    name: cluster-config-v1
    namespace: kube-system
    kubeconfig: "{{ cluster_discovery_kubeconfig }}"
  register: cluster_discovery_cluster_config
  when: cluster_discovery_need_cidr_lookup | bool

- name: Parse install-config from cluster-config-v1 - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_install_config: "{{ cluster_discovery_cluster_config.resources[0].data['install-config'] | from_yaml }}"
  when:
    - cluster_discovery_need_cidr_lookup | bool
    - cluster_discovery_cluster_config.resources is defined
    - cluster_discovery_cluster_config.resources | length > 0

# Resolve each value: use override if provided, otherwise use looked-up value
- name: Resolve cluster_name - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_resolved_cluster_name: >-
      {{ cluster_discovery_name_override | default('') | trim
         if (cluster_discovery_name_override | default('') | trim) != ''
         else cluster_discovery_infra_info.resources[0].status.infrastructureName }}

- name: Resolve region - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_resolved_region: >-
      {{ cluster_discovery_region_override | default('') | trim
         if (cluster_discovery_region_override | default('') | trim) != ''
         else cluster_discovery_infra_info.resources[0].status.platformStatus.aws.region }}

- name: Resolve VPC CIDR - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_resolved_vpc_cidr: >-
      {{ cluster_discovery_vpc_cidr_override | default('') | trim
         if (cluster_discovery_vpc_cidr_override | default('') | trim) != ''
         else cluster_discovery_install_config.networking.machineNetwork[0].cidr | default('') }}

- name: Resolve infra_name - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_resolved_infra_name: >-
      {{ cluster_discovery_infra_info.resources[0].status.infrastructureName
         if (cluster_discovery_infra_info is defined and
             cluster_discovery_infra_info.resources is defined and
             cluster_discovery_infra_info.resources | length > 0)
         else cluster_discovery_resolved_cluster_name }}

- name: Resolve is_hcp - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_resolved_is_hcp: >-
      {{ cluster_discovery_infra_info.resources[0].status.controlPlaneTopology | default('') == 'External'
         if (cluster_discovery_infra_info is defined and
             cluster_discovery_infra_info.resources is defined and
             cluster_discovery_infra_info.resources | length > 0)
         else false }}

- name: Build cluster_discovery_result dict - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_result:
      cluster_name: "{{ cluster_discovery_resolved_cluster_name | trim }}"
      region: "{{ cluster_discovery_resolved_region | trim }}"
      vpc_cidr: "{{ cluster_discovery_resolved_vpc_cidr | trim }}"
      infra_name: "{{ cluster_discovery_resolved_infra_name | trim }}"
      is_hcp: "{{ cluster_discovery_resolved_is_hcp | trim }}"

- name: Resolve VPC name - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_result: >-
      {{ cluster_discovery_result | combine({
          'vpc_name': (cluster_discovery_vpc_name_override | default('') | trim)
            if (cluster_discovery_vpc_name_override | default('') | trim) != ''
            else (cluster_discovery_result.infra_name ~ '-vpc')
      }) }}

- name: Display resolved values before AWS lookups - {{ cluster_discovery_label }}
  ansible.builtin.debug:
    msg:
      - "Cluster Name:  {{ cluster_discovery_result.cluster_name }}"
      - "Region:        {{ cluster_discovery_result.region }}"
      - "VPC CIDR:      {{ cluster_discovery_result.vpc_cidr }}"
      - "VPC Name:      {{ cluster_discovery_result.vpc_name }}"
      - "Infra Name:    {{ cluster_discovery_result.infra_name }}"
      - "Is HCP:        {{ cluster_discovery_result.is_hcp }}"

- name: Look up VPC by name - {{ cluster_discovery_label }}
  amazon.aws.ec2_vpc_net_info:
    region: "{{ cluster_discovery_result.region }}"
    filters:
      "tag:Name": "{{ cluster_discovery_result.vpc_name }}"
  register: cluster_discovery_vpc_lookup

- name: Fall back to cluster tag lookup (HCP) - {{ cluster_discovery_label }}
  amazon.aws.ec2_vpc_net_info:
    region: "{{ cluster_discovery_result.region }}"
    filters:
      "tag:sigs.k8s.io/cluster-api-provider-aws/cluster/{{ cluster_discovery_result.infra_name }}": owned
  register: cluster_discovery_vpc_lookup_tag
  when:
    - cluster_discovery_result.is_hcp | bool
    - cluster_discovery_vpc_lookup.vpcs | default([]) | length == 0

- name: Set VPC ID - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_result: >-
      {{ cluster_discovery_result | combine({
          'vpc_id': (
            cluster_discovery_vpc_lookup.vpcs[0].vpc_id
            if (cluster_discovery_vpc_lookup.vpcs | default([]) | length > 0)
            else (
              cluster_discovery_vpc_lookup_tag.vpcs[0].vpc_id
              if (cluster_discovery_vpc_lookup_tag is defined and cluster_discovery_vpc_lookup_tag.vpcs | default([]) | length > 0)
              else ''
            )
          )
      }) }}

- name: Fail if VPC not found - {{ cluster_discovery_label }}
  ansible.builtin.fail:
    msg: >
      VPC not found for cluster '{{ cluster_discovery_result.cluster_name }}'
      in region {{ cluster_discovery_result.region }}.
      VPC name searched: '{{ cluster_discovery_result.vpc_name }}'.
      You can override with cluster_discovery_vpc_name_override or provide vpc_id directly.
  when: cluster_discovery_result.vpc_id | default('') == ''

- name: Correct VPC CIDR from AWS - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_result: >-
      {{ cluster_discovery_result | combine({
          'vpc_cidr': cluster_discovery_actual_cidr
      }) }}
  vars:
    cluster_discovery_actual_cidr: >-
      {{ cluster_discovery_vpc_lookup.vpcs[0].cidr_block
         if (cluster_discovery_vpc_lookup.vpcs | default([]) | length > 0)
         else (
           cluster_discovery_vpc_lookup_tag.vpcs[0].cidr_block
           if (cluster_discovery_vpc_lookup_tag is defined and cluster_discovery_vpc_lookup_tag.vpcs | default([]) | length > 0)
           else cluster_discovery_result.vpc_cidr
         ) }}
  when:
    - cluster_discovery_result.vpc_id | default('') != ''
    - cluster_discovery_vpc_cidr_override | default('') | trim == ''

# Discover subnets (private subnets tagged by the cluster)
- name: Build subnet filters (standard cluster) - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_subnet_filters: "{{ cluster_discovery_tag_list | items2dict }}"
  vars:
    cluster_discovery_tag_list:
      - key: "vpc-id"
        value: "{{ cluster_discovery_result.vpc_id }}"
      - key: "tag:sigs.k8s.io/cluster-api-provider-aws/role"
        value: "private"
      - key: "tag:kubernetes.io/cluster/{{ cluster_discovery_result.infra_name }}"
        value: "owned"
      - key: "tag:sigs.k8s.io/cluster-api-provider-aws/cluster/{{ cluster_discovery_result.infra_name }}"
        value: "owned"
  when: not (cluster_discovery_result.is_hcp | bool)

- name: Build subnet filters (HCP cluster) - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_subnet_filters: "{{ cluster_discovery_tag_list | items2dict }}"
  vars:
    cluster_discovery_tag_list:
      - key: "vpc-id"
        value: "{{ cluster_discovery_result.vpc_id }}"
      - key: "tag:kubernetes.io/role/internal-elb"
        value: "1"
  when: cluster_discovery_result.is_hcp | bool

- name: Look up private subnets - {{ cluster_discovery_label }}
  amazon.aws.ec2_vpc_subnet_info:
    region: "{{ cluster_discovery_result.region }}"
    filters: "{{ cluster_discovery_subnet_filters }}"
  register: cluster_discovery_subnet_lookup

- name: Fail if insufficient subnets - {{ cluster_discovery_label }}
  ansible.builtin.fail:
    msg: >
      Need at least 2 private subnets for MULTI_AZ FSx deployment in
      {{ cluster_discovery_result.region }}, found {{ cluster_discovery_subnet_lookup.subnets | default([]) | length }}.
  when: cluster_discovery_subnet_lookup.subnets | default([]) | length < 2

- name: Set subnet IDs - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_result: >-
      {{ cluster_discovery_result | combine({
          'subnet_ids': cluster_discovery_subnet_lookup.subnets | map(attribute='id') | list
      }) }}

# Discover route tables for those subnets
- name: Look up route tables - {{ cluster_discovery_label }}
  amazon.aws.ec2_vpc_route_table_info:
    region: "{{ cluster_discovery_result.region }}"
    filters:
      "association.subnet-id": "{{ cluster_discovery_result.subnet_ids }}"
      vpc-id: "{{ cluster_discovery_result.vpc_id }}"
  register: cluster_discovery_rt_lookup

- name: Set route table IDs - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_result: >-
      {{ cluster_discovery_result | combine({
          'route_table_ids': cluster_discovery_rt_lookup.route_tables | map(attribute='id') | list | unique
      }) }}

# Also collect ALL route tables in the VPC (needed for VPC peering routes)
- name: Look up all VPC route tables - {{ cluster_discovery_label }}
  amazon.aws.ec2_vpc_route_table_info:
    region: "{{ cluster_discovery_result.region }}"
    filters:
      vpc-id: "{{ cluster_discovery_result.vpc_id }}"
  register: cluster_discovery_all_rt_lookup

- name: Set all route table IDs - {{ cluster_discovery_label }}
  ansible.builtin.set_fact:
    cluster_discovery_result: >-
      {{ cluster_discovery_result | combine({
          'all_route_table_ids': cluster_discovery_all_rt_lookup.route_tables | map(attribute='id') | list | unique
      }) }}

- name: Display discovered cluster info - {{ cluster_discovery_label }}
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "Discovered Cluster: {{ cluster_discovery_label }}"
      - "=========================================="
      - "  Cluster Name:    {{ cluster_discovery_result.cluster_name }}"
      - "  Region:          {{ cluster_discovery_result.region }}"
      - "  VPC ID:          {{ cluster_discovery_result.vpc_id }}"
      - "  VPC Name:        {{ cluster_discovery_result.vpc_name }}"
      - "  VPC CIDR:        {{ cluster_discovery_result.vpc_cidr }}"
      - "  HCP Cluster:     {{ cluster_discovery_result.is_hcp }}"
      - "  Subnet IDs:      {{ cluster_discovery_result.subnet_ids }}"
      - "  Route Table IDs: {{ cluster_discovery_result.route_table_ids }}"
      - "  All RT IDs:      {{ cluster_discovery_result.all_route_table_ids }}"
      - "=========================================="
