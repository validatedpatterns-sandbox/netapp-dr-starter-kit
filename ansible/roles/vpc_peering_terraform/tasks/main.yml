---
# vpc_peering_terraform role
#
# Manages cross-region VPC peering via Terraform.
# Expects prod_cluster and dr_cluster dicts from cluster_discovery role.
# Terraform runs inside a container (podman/docker).

- name: Display VPC peering configuration
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "VPC Peering Terraform Role"
      - "=========================================="
      - "Prod: {{ prod_cluster.cluster_name }} ({{ prod_cluster.region }}) - {{ prod_cluster.vpc_cidr }}"
      - "DR:   {{ dr_cluster.cluster_name }} ({{ dr_cluster.region }}) - {{ dr_cluster.vpc_cidr }}"
      - "Operation: {{ 'DESTROY' if (vpc_peering_terraform_destroy | default(false)) else 'APPLY' }}"
      - "State: {{ vpc_peering_terraform_state_bucket | default('local') }}"
      - "Container: {{ vpc_peering_terraform_image }}"
      - "=========================================="

# Get AWS credentials (needed for both operations and bucket check)
- name: Get AWS credentials from boto3 session
  ansible.builtin.shell: |
    python3 -c "
    import json, boto3
    creds = boto3.Session().get_credentials().get_frozen_credentials()
    print(json.dumps({'ak': creds.access_key, 'sk': creds.secret_key, 'st': creds.token or ''}))
    "
  register: vpc_peering_terraform_boto3_creds
  changed_when: false

- name: Set AWS credentials
  ansible.builtin.set_fact:
    vpc_peering_terraform_aws_creds: "{{ vpc_peering_terraform_boto3_creds.stdout | from_json }}"
    vpc_peering_terraform_aws_env:
      AWS_ACCESS_KEY_ID: "{{ (vpc_peering_terraform_boto3_creds.stdout | from_json).ak }}"
      AWS_SECRET_ACCESS_KEY: "{{ (vpc_peering_terraform_boto3_creds.stdout | from_json).sk }}"
      AWS_SESSION_TOKEN: "{{ (vpc_peering_terraform_boto3_creds.stdout | from_json).st }}"
      AWS_REGION: "{{ prod_cluster.region }}"
      AWS_DEFAULT_REGION: "{{ prod_cluster.region }}"

# ---------------------------------------------------------------------------
# Pre-flight: verify the S3 state bucket exists before running terraform.
# If the bucket was already destroyed, terraform init will fail. In that case
# skip the operation — there is no state to read or destroy.
# ---------------------------------------------------------------------------
- name: Check if S3 state bucket exists
  ansible.builtin.shell: >-
    aws s3api head-bucket --bucket {{ vpc_peering_terraform_state_bucket }} 2>/dev/null
    && echo "exists" || echo "missing"
  register: vpc_peering_terraform_bucket_check
  changed_when: false
  environment: "{{ vpc_peering_terraform_aws_env }}"
  when: vpc_peering_terraform_state_bucket | default('') | length > 0

- name: Set state bucket availability flag
  ansible.builtin.set_fact:
    vpc_peering_terraform_bucket_available: >-
      {{ (vpc_peering_terraform_state_bucket | default('') | length > 0) and
         (vpc_peering_terraform_bucket_check.stdout | default('missing') is search('exists')) }}

- name: Skip - S3 state bucket does not exist
  ansible.builtin.debug:
    msg:
      - "S3 state bucket '{{ vpc_peering_terraform_state_bucket }}' does not exist."
      - "Skipping {{ 'destroy' if (vpc_peering_terraform_destroy | default(false)) else 'apply' }} for VPC peering."
      - "If you need to clean up orphaned resources, do so manually in the AWS console."
  when: not vpc_peering_terraform_bucket_available and (vpc_peering_terraform_state_bucket | default('') | length > 0)

# ---------------------------------------------------------------------------
# Common setup (runs for both create and destroy when state bucket is available)
# ---------------------------------------------------------------------------
- name: Setup terraform workspace
  when: vpc_peering_terraform_bucket_available or (vpc_peering_terraform_state_bucket | default('') | length == 0)
  block:
    - name: Create terraform working directory
      ansible.builtin.file:
        path: "{{ vpc_peering_terraform_tf_workdir }}"
        state: directory
        mode: '0755'

    - name: Copy terraform files to working directory
      ansible.builtin.copy:
        src: "{{ vpc_peering_terraform_tf_source }}/{{ item }}"
        dest: "{{ vpc_peering_terraform_tf_workdir }}/{{ item }}"
        mode: '0644'
      loop:
        - main.tf
        - variables.tf
        - outputs.tf
        - providers.tf

    - name: Check if S3 backend is configured
      ansible.builtin.set_fact:
        vpc_peering_terraform_use_s3_backend: "{{ vpc_peering_terraform_state_bucket | default('') | length > 0 }}"

    - name: Generate backend.tf for S3 state storage
      ansible.builtin.template:
        src: backend.tf.j2
        dest: "{{ vpc_peering_terraform_tf_workdir }}/backend.tf"
        mode: '0644'
      when: vpc_peering_terraform_use_s3_backend

    - name: Remove backend.tf if not using S3 backend
      ansible.builtin.file:
        path: "{{ vpc_peering_terraform_tf_workdir }}/backend.tf"
        state: absent
      when: not vpc_peering_terraform_use_s3_backend

    - name: Generate terraform.tfvars
      ansible.builtin.template:
        src: terraform.tfvars.j2
        dest: "{{ vpc_peering_terraform_tf_workdir }}/terraform.tfvars"
        mode: '0600'

    # Build the container terraform command prefix
    - name: Build terraform container command
      ansible.builtin.set_fact:
        vpc_peering_terraform_tf_cmd: >-
          {{ vpc_peering_terraform_container_runtime }} run --rm
          -v {{ vpc_peering_terraform_tf_workdir }}:/workspace:Z
          -w /workspace
          -e AWS_ACCESS_KEY_ID={{ vpc_peering_terraform_aws_creds.ak }}
          -e AWS_SECRET_ACCESS_KEY={{ vpc_peering_terraform_aws_creds.sk }}
          {% if vpc_peering_terraform_aws_creds.st %}-e AWS_SESSION_TOKEN={{ vpc_peering_terraform_aws_creds.st }}{% endif %}
          -e AWS_REGION={{ prod_cluster.region }}
          -e AWS_DEFAULT_REGION={{ prod_cluster.region }}
          {{ vpc_peering_terraform_image }}

    - name: Initialize Terraform
      ansible.builtin.command: "{{ vpc_peering_terraform_tf_cmd }} terraform init -upgrade -reconfigure -no-color"
      register: vpc_peering_terraform_tf_init
      changed_when: "'Terraform has been successfully initialized' in vpc_peering_terraform_tf_init.stdout"

    # -----------------------------------------------------------------
    # Idempotency: import existing AWS resources into terraform state
    # if they exist in AWS but not in terraform state (e.g. after state
    # bucket was recreated). This prevents "already exists" errors.
    # -----------------------------------------------------------------
    - name: Check terraform state for peering connection
      ansible.builtin.shell: "{{ vpc_peering_terraform_tf_cmd }} terraform state list 2>/dev/null"
      register: vpc_peering_terraform_tf_state_list
      changed_when: false
      failed_when: false

    - name: Check for existing VPC peering in AWS
      ansible.builtin.shell: >-
        aws ec2 describe-vpc-peering-connections
        --filters
        Name=requester-vpc-info.vpc-id,Values={{ prod_cluster.vpc_id }}
        Name=accepter-vpc-info.vpc-id,Values={{ dr_cluster.vpc_id }}
        Name=status-code,Values=active
        --query 'VpcPeeringConnections[0].VpcPeeringConnectionId'
        --output text
        --region {{ prod_cluster.region }}
      environment: "{{ vpc_peering_terraform_aws_env }}"
      register: vpc_peering_terraform_existing_peering
      changed_when: false
      when: "'aws_vpc_peering_connection.prod_to_dr' not in (vpc_peering_terraform_tf_state_list.stdout | default(''))"

    - name: Set existing peering ID
      ansible.builtin.set_fact:
        vpc_peering_terraform_existing_pcx_id: "{{ vpc_peering_terraform_existing_peering.stdout | default('None') | trim }}"
      when: vpc_peering_terraform_existing_peering is not skipped

    # --- Import peering connection if it exists in AWS but not in state ---
    - name: Import existing VPC peering connection
      when:
        - vpc_peering_terraform_existing_pcx_id is defined
        - vpc_peering_terraform_existing_pcx_id != 'None'
        - vpc_peering_terraform_existing_pcx_id != ''
        - "'aws_vpc_peering_connection.prod_to_dr' not in (vpc_peering_terraform_tf_state_list.stdout | default(''))"
      block:
        - name: Display peering import notice
          ansible.builtin.debug:
            msg: "Found existing VPC peering {{ vpc_peering_terraform_existing_pcx_id }} not in state - importing..."

        - name: Generate peering import script
          ansible.builtin.copy:
            dest: "{{ vpc_peering_terraform_tf_workdir }}/import.sh"
            mode: '0755'
            content: |
              #!/bin/sh
              echo "=== Importing VPC peering connection ==="
              terraform import -no-color aws_vpc_peering_connection.prod_to_dr {{ vpc_peering_terraform_existing_pcx_id }} || true
              echo "=== Importing VPC peering accepter ==="
              terraform import -no-color aws_vpc_peering_connection_accepter.dr_accept {{ vpc_peering_terraform_existing_pcx_id }} || true
              echo "=== Peering import complete ==="

        - name: Run peering import script inside container
          ansible.builtin.command: "{{ vpc_peering_terraform_tf_cmd }} sh /workspace/import.sh"
          register: vpc_peering_terraform_import_result
          changed_when: true

        - name: Display peering import results
          ansible.builtin.debug:
            msg: "{{ vpc_peering_terraform_import_result.stdout_lines }}"

        - name: Clean up import script
          ansible.builtin.file:
            path: "{{ vpc_peering_terraform_tf_workdir }}/import.sh"
            state: absent

    # --- Delete stale routes if they exist in AWS but not in terraform state ---
    # This is separate from the peering import because the peering may have
    # been imported on a previous run while routes remain orphaned.
    # We only run this when a peering connection exists in AWS (brownfield);
    # on greenfield there are no routes to clean up.
    - name: Check if routes are tracked in terraform state
      ansible.builtin.set_fact:
        vpc_peering_terraform_routes_in_state: "{{ 'aws_route.prod_to_dr' in (vpc_peering_terraform_tf_state_list.stdout | default('')) }}"
        # A peering connection exists if we found one in AWS or if it's
        # already tracked in state.  On greenfield neither is true, so we
        # can safely skip the (noisy) route-deletion loop.
        vpc_peering_terraform_peering_exists: >-
          {{ ((vpc_peering_terraform_existing_pcx_id | default('')) not in ['None', '']) or
             ('aws_vpc_peering_connection.prod_to_dr' in (vpc_peering_terraform_tf_state_list.stdout | default(''))) }}

    - name: Delete orphaned routes from AWS
      when:
        - not vpc_peering_terraform_routes_in_state
        - vpc_peering_terraform_peering_exists | bool
      block:
        - name: Display route cleanup notice
          ansible.builtin.debug:
            msg: "Routes not in terraform state - deleting from AWS so terraform can recreate them."

        - name: Delete orphaned prod-to-dr routes
          ansible.builtin.command:
            argv:
              - aws
              - ec2
              - delete-route
              - --route-table-id
              - "{{ item }}"
              - --destination-cidr-block
              - "{{ dr_cluster.vpc_cidr }}"
              - --region
              - "{{ prod_cluster.region }}"
          environment: "{{ vpc_peering_terraform_aws_env }}"
          loop: "{{ prod_cluster.all_route_table_ids }}"
          register: vpc_peering_terraform_del_prod_routes
          failed_when: false
          changed_when: vpc_peering_terraform_del_prod_routes.rc == 0

        - name: Delete orphaned dr-to-prod routes
          ansible.builtin.command:
            argv:
              - aws
              - ec2
              - delete-route
              - --route-table-id
              - "{{ item }}"
              - --destination-cidr-block
              - "{{ prod_cluster.vpc_cidr }}"
              - --region
              - "{{ dr_cluster.region }}"
          environment: "{{ vpc_peering_terraform_aws_env }}"
          loop: "{{ dr_cluster.all_route_table_ids }}"
          register: vpc_peering_terraform_del_dr_routes
          failed_when: false
          changed_when: vpc_peering_terraform_del_dr_routes.rc == 0

        - name: Display route cleanup results
          ansible.builtin.debug:
            msg:
              - >
                Prod routes deleted:
                {{ vpc_peering_terraform_del_prod_routes.results | selectattr('rc', 'eq', 0) | list | length }}/
                {{ prod_cluster.all_route_table_ids | length }}
              - >
                DR routes deleted:
                {{ vpc_peering_terraform_del_dr_routes.results | selectattr('rc', 'eq', 0) | list | length }}/
                {{ dr_cluster.all_route_table_ids | length }}

# ---------------------------------------------------------------------------
# Create / Apply
# ---------------------------------------------------------------------------
- name: Apply terraform
  when:
    - not (vpc_peering_terraform_destroy | default(false))
    - vpc_peering_terraform_bucket_available or (vpc_peering_terraform_state_bucket | default('') | length == 0)
  block:
    - name: Terraform plan
      ansible.builtin.command: "{{ vpc_peering_terraform_tf_cmd }} terraform plan -out=tfplan -input=false -no-color"
      register: vpc_peering_terraform_tf_plan
      changed_when: false

    - name: Terraform apply
      ansible.builtin.command: "{{ vpc_peering_terraform_tf_cmd }} terraform apply -auto-approve -no-color tfplan"
      register: vpc_peering_terraform_tf_apply
      changed_when: true

    - name: Get Terraform outputs
      ansible.builtin.command: "{{ vpc_peering_terraform_tf_cmd }} terraform output -json -no-color"
      register: vpc_peering_terraform_tf_outputs_raw
      changed_when: false

    - name: Parse and display peering outputs
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "VPC Peering Complete"
          - "=========================================="
          - "Peering Connection ID: {{ (vpc_peering_terraform_tf_outputs_raw.stdout | from_json).peering_connection_id.value }}"
          - "Status: {{ (vpc_peering_terraform_tf_outputs_raw.stdout | from_json).peering_connection_status.value }}"
          - "=========================================="
      when: vpc_peering_terraform_tf_outputs_raw.stdout is defined

# ---------------------------------------------------------------------------
# Destroy
# ---------------------------------------------------------------------------
- name: Destroy terraform resources
  when:
    - vpc_peering_terraform_destroy | default(false)
    - vpc_peering_terraform_bucket_available or (vpc_peering_terraform_state_bucket | default('') | length == 0)
  block:
    - name: Terraform destroy plan
      ansible.builtin.command: "{{ vpc_peering_terraform_tf_cmd }} terraform plan -destroy -out=tfplan-destroy -input=false -no-color"
      changed_when: false

    - name: Terraform destroy
      ansible.builtin.command: "{{ vpc_peering_terraform_tf_cmd }} terraform apply -auto-approve -no-color tfplan-destroy"
      changed_when: true

    - name: Display destroy completion
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "VPC Peering Resources Destroyed"
          - "=========================================="
