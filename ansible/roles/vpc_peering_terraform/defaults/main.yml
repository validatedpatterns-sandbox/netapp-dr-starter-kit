---
# Defaults for vpc_peering_terraform role

# Terraform source directory (where .tf files live)
vpc_peering_terraform_tf_source: "{{ playbook_dir }}/../terraform/vpc-peering"

# Working directory for terraform execution (per-deployment isolation)
vpc_peering_terraform_tf_workdir: "/tmp/netapp-dr-terraform/vpc-peering"

# Container configuration for running Terraform
vpc_peering_terraform_container_runtime: "podman"
vpc_peering_terraform_image: "quay.io/validatedpatterns/terraform:1.14.3"

# Terraform state (S3 backend)
vpc_peering_terraform_state_bucket: ""
vpc_peering_terraform_state_key: "vpc-peering/terraform.tfstate"
vpc_peering_terraform_state_dynamodb_table: "terraform-state-lock"

# Enable DNS resolution across the peering connection
# Requires ec2:ModifyVpcPeeringConnectionOptions permission
vpc_peering_terraform_enable_dns_resolution: false

# Operation mode
vpc_peering_terraform_destroy: false

# Tags
vpc_peering_terraform_tags:
  ManagedBy: "Terraform"
  Purpose: "DR-VPC-Peering"
