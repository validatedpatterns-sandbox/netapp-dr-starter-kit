---
# =============================================================================
# NetApp DR Starter Kit - Crossplane Infrastructure Setup
# =============================================================================
#
# This playbook discovers cluster infrastructure and writes the discovered
# values into the Helm values files so that Crossplane (via ArgoCD) creates
# all AWS resources: FSx ONTAP, S3, VPC Peering, Route53 Failover.
#
# No Terraform is used. Kubernetes (Crossplane) is the control plane.
#
# What this playbook does:
#   1. Discovers prod and DR cluster info (VPC, subnets, route tables, region)
#   2. Writes fsxOntap.* values into values-hub.yaml and values-secondary.yaml
#   3. Writes vpcPeering.* values into values-hub.yaml
#   4. Writes s3AppVault.* values from values-global.yaml
#   5. Writes route53Failover.* and drDnsReconciler.* (domain from cluster DNS;
#      hosted zone ID via AWS lookup or dr_failover_hosted_zone_id — see crossplane-vars.yml)
#
# Once committed and pushed, ArgoCD syncs the Crossplane managed resources.
#
# Usage:
#   ansible-playbook ansible/crossplane-setup.yaml \
#     -e @ansible/crossplane-vars.yml \
#     -e prod_kubeconfig=/path/to/prod/kubeconfig \
#     -e dr_kubeconfig=/path/to/dr/kubeconfig
#
# =============================================================================

# -----------------------------------------------------------------------------
# Play 1: Discover Production Cluster
# -----------------------------------------------------------------------------
- name: Discover Production Cluster
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Validate prod_kubeconfig is provided
      ansible.builtin.fail:
        msg: "prod_kubeconfig is required. Pass it via -e prod_kubeconfig=/path/to/kubeconfig"
      when: prod_kubeconfig is not defined or prod_kubeconfig == ''

    - name: Discover production cluster
      ansible.builtin.include_role:
        name: cluster_discovery
      vars:
        cluster_discovery_kubeconfig: "{{ prod_kubeconfig }}"
        cluster_discovery_label: "Production"
        cluster_discovery_name_override: "{{ prod_cluster_name_override | default('') }}"
        cluster_discovery_region_override: "{{ prod_region_override | default('') }}"
        cluster_discovery_vpc_cidr_override: "{{ prod_vpc_cidr_override | default('') }}"
        cluster_discovery_vpc_name_override: "{{ prod_vpc_name_override | default('') }}"

    - name: Store production cluster info
      ansible.builtin.set_fact:
        prod_cluster: "{{ cluster_discovery_result }}"
        cacheable: true

# -----------------------------------------------------------------------------
# Play 2: Discover DR Cluster
# -----------------------------------------------------------------------------
- name: Discover DR Cluster
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Validate dr_kubeconfig is provided
      ansible.builtin.fail:
        msg: "dr_kubeconfig is required. Pass it via -e dr_kubeconfig=/path/to/kubeconfig"
      when: dr_kubeconfig is not defined or dr_kubeconfig == ''

    - name: Discover DR cluster
      ansible.builtin.include_role:
        name: cluster_discovery
      vars:
        cluster_discovery_kubeconfig: "{{ dr_kubeconfig }}"
        cluster_discovery_label: "DR"
        cluster_discovery_name_override: "{{ dr_cluster_name_override | default('') }}"
        cluster_discovery_region_override: "{{ dr_region_override | default('') }}"
        cluster_discovery_vpc_cidr_override: "{{ dr_vpc_cidr_override | default('') }}"
        cluster_discovery_vpc_name_override: "{{ dr_vpc_name_override | default('') }}"

    - name: Store DR cluster info
      ansible.builtin.set_fact:
        dr_cluster: "{{ cluster_discovery_result }}"
        cacheable: true

# -----------------------------------------------------------------------------
# Play 3: Compute all derived values
# -----------------------------------------------------------------------------
- name: Compute Crossplane values from discovered cluster info
  hosts: localhost
  gather_facts: false
  vars:
    _project_root: "{{ playbook_dir }}/.."
  tasks:
    - name: Load values-global.yaml for AppVault config
      ansible.builtin.set_fact:
        _values_global: "{{ lookup('file', _project_root ~ '/values-global.yaml') | from_yaml }}"

    - name: Derive FSx file system names
      ansible.builtin.set_fact:
        _prod_fsx_name: "{{ prod_file_system_name | default(prod_cluster.cluster_name ~ '-' ~ prod_cluster.region ~ '-fsx') }}"
        _dr_fsx_name: "{{ dr_file_system_name | default(dr_cluster.cluster_name ~ '-' ~ dr_cluster.region ~ '-fsx') }}"

    - name: Derive AppVault bucket config
      ansible.builtin.set_fact:
        _appvault_bucket: "{{ appvault_bucket_name | default(_values_global.tridentProtect.appVault.s3.bucketName) }}"
        _appvault_region: "{{ appvault_region | default(_values_global.tridentProtect.appVault.s3.region) }}"

    - name: Display computed values
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - "  Crossplane Values - Computed from Cluster Discovery"
          - "============================================================"
          - ""
          - "  PRODUCTION CLUSTER"
          - "    Cluster:       {{ prod_cluster.cluster_name }}"
          - "    Region:        {{ prod_cluster.region }}"
          - "    VPC ID:        {{ prod_cluster.vpc_id }}"
          - "    VPC CIDR:      {{ prod_cluster.vpc_cidr }}"
          - "    Subnets:       {{ prod_cluster.subnet_ids }}"
          - "    Route Tables:  {{ prod_cluster.route_table_ids }}"
          - "    FSx Name:      {{ _prod_fsx_name }}"
          - ""
          - "  DR CLUSTER"
          - "    Cluster:       {{ dr_cluster.cluster_name }}"
          - "    Region:        {{ dr_cluster.region }}"
          - "    VPC ID:        {{ dr_cluster.vpc_id }}"
          - "    VPC CIDR:      {{ dr_cluster.vpc_cidr }}"
          - "    Subnets:       {{ dr_cluster.subnet_ids }}"
          - "    Route Tables:  {{ dr_cluster.route_table_ids }}"
          - "    FSx Name:      {{ _dr_fsx_name }}"
          - ""
          - "  APPVAULT"
          - "    Bucket: {{ _appvault_bucket }}"
          - "    Region: {{ _appvault_region }}"
          - "============================================================"

# -----------------------------------------------------------------------------
# Play 4: Write Crossplane values into values-hub.yaml
# -----------------------------------------------------------------------------
- name: Write Crossplane values to values-hub.yaml
  hosts: localhost
  gather_facts: false
  vars:
    _project_root: "{{ playbook_dir }}/.."
    _prod_fsx_name: "{{ prod_file_system_name | default(prod_cluster.cluster_name ~ '-' ~ prod_cluster.region ~ '-fsx') }}"
    _dr_fsx_name: "{{ dr_file_system_name | default(dr_cluster.cluster_name ~ '-' ~ dr_cluster.region ~ '-fsx') }}"
    _values_global: "{{ lookup('file', playbook_dir ~ '/../values-global.yaml') | from_yaml }}"
    _appvault_bucket: "{{ appvault_bucket_name | default(_values_global.tridentProtect.appVault.s3.bucketName) }}"
    _appvault_region: "{{ appvault_region | default(_values_global.tridentProtect.appVault.s3.region) }}"
  tasks:
    - name: Write fsxOntap values to values-hub.yaml
      ansible.builtin.shell: |
        yq -i '.fsxOntap.enabled = true' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.region = "{{ prod_cluster.region }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.fileSystemName = "{{ _prod_fsx_name }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.vpcId = "{{ prod_cluster.vpc_id }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.subnetIds = {{ prod_cluster.subnet_ids[:2] | to_json }}' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.routeTableIds = {{ prod_cluster.route_table_ids | to_json }}' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.preferredSubnetId = "{{ prod_cluster.subnet_ids[0] }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.allowedCidrs = {{ [prod_cluster.vpc_cidr, dr_cluster.vpc_cidr] | to_json }}' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.storageCapacity = {{ fsx_storage_capacity | default(1024) }}' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.throughputCapacity = {{ fsx_throughput_capacity | default(1024) }}' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.storageType = "{{ fsx_storage_type | default("SSD") }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.deploymentType = "{{ fsx_deployment_type | default("MULTI_AZ_1") }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.svmName = "SVM1"' {{ _project_root }}/values-hub.yaml
      changed_when: true

    - name: Write s3AppVault values to values-hub.yaml
      ansible.builtin.shell: |
        yq -i '.s3AppVault.enabled = true' {{ _project_root }}/values-hub.yaml
        yq -i '.s3AppVault.bucketName = "{{ _appvault_bucket }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.s3AppVault.region = "{{ _appvault_region }}"' {{ _project_root }}/values-hub.yaml
      changed_when: true

    - name: Write peer FSx values to values-hub.yaml (hub creates both filesystems)
      ansible.builtin.shell: |
        yq -i '.fsxOntap.peer.enabled = true' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.peer.region = "{{ dr_cluster.region }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.peer.fileSystemName = "{{ _dr_fsx_name }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.peer.vpcId = "{{ dr_cluster.vpc_id }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.peer.subnetIds = {{ dr_cluster.subnet_ids[:2] | to_json }}' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.peer.routeTableIds = {{ dr_cluster.route_table_ids | to_json }}' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.peer.preferredSubnetId = "{{ dr_cluster.subnet_ids[0] }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.peer.allowedCidrs = {{ [dr_cluster.vpc_cidr, prod_cluster.vpc_cidr] | to_json }}' {{ _project_root }}/values-hub.yaml
        yq -i '.fsxOntap.peer.svmName = "SVM2"' {{ _project_root }}/values-hub.yaml
      changed_when: true

    - name: Write endpoint watcher values to values-hub.yaml
      ansible.builtin.shell: |
        yq -i '.endpointWatcher.enabled = true' {{ _project_root }}/values-hub.yaml
        yq -i '.endpointWatcher.local.fileSystemName = "{{ _prod_fsx_name }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.endpointWatcher.local.region = "{{ prod_cluster.region }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.endpointWatcher.local.svmName = "SVM1"' {{ _project_root }}/values-hub.yaml
        yq -i '.endpointWatcher.peer.fileSystemName = "{{ _dr_fsx_name }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.endpointWatcher.peer.region = "{{ dr_cluster.region }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.endpointWatcher.peer.svmName = "SVM2"' {{ _project_root }}/values-hub.yaml
      changed_when: true

    - name: Write vpcPeering values to values-hub.yaml
      ansible.builtin.shell: |
        yq -i '.vpcPeering.enabled = true' {{ _project_root }}/values-hub.yaml
        yq -i '.vpcPeering.prod.region = "{{ prod_cluster.region }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.vpcPeering.prod.vpcId = "{{ prod_cluster.vpc_id }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.vpcPeering.prod.vpcCidr = "{{ prod_cluster.vpc_cidr }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.vpcPeering.prod.clusterName = "{{ prod_cluster.cluster_name }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.vpcPeering.prod.routeTableIds = {{ prod_cluster.all_route_table_ids | to_json }}' {{ _project_root }}/values-hub.yaml
        yq -i '.vpcPeering.dr.region = "{{ dr_cluster.region }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.vpcPeering.dr.vpcId = "{{ dr_cluster.vpc_id }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.vpcPeering.dr.vpcCidr = "{{ dr_cluster.vpc_cidr }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.vpcPeering.dr.clusterName = "{{ dr_cluster.cluster_name }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.vpcPeering.dr.routeTableIds = {{ dr_cluster.all_route_table_ids | to_json }}' {{ _project_root }}/values-hub.yaml
      changed_when: true
      when: vpc_peering_enabled | default(true) | bool

# -----------------------------------------------------------------------------
# Play 5: Write Crossplane values into values-secondary.yaml
# -----------------------------------------------------------------------------
- name: Write Crossplane values to values-secondary.yaml
  hosts: localhost
  gather_facts: false
  vars:
    _project_root: "{{ playbook_dir }}/.."
    _dr_fsx_name: "{{ dr_file_system_name | default(dr_cluster.cluster_name ~ '-' ~ dr_cluster.region ~ '-fsx') }}"
    _values_global: "{{ lookup('file', playbook_dir ~ '/../values-global.yaml') | from_yaml }}"
    _appvault_bucket: "{{ appvault_bucket_name | default(_values_global.tridentProtect.appVault.s3.bucketName) }}"
    _appvault_region: "{{ appvault_region | default(_values_global.tridentProtect.appVault.s3.region) }}"
  tasks:
    - name: Write crossplane-aws-infra values to values-secondary.yaml (FSx disabled, hub creates it)
      ansible.builtin.shell: |
        yq -i '.fsxOntap.enabled = false' {{ _project_root }}/values-secondary.yaml
        yq -i '.s3AppVault.enabled = false' {{ _project_root }}/values-secondary.yaml
        yq -i '.vpcPeering.enabled = false' {{ _project_root }}/values-secondary.yaml
        yq -i '.route53Failover.enabled = false' {{ _project_root }}/values-secondary.yaml
      changed_when: true

    - name: Write endpoint watcher values to values-secondary.yaml (flipped local/peer)
      ansible.builtin.shell: |
        yq -i '.endpointWatcher.enabled = true' {{ _project_root }}/values-secondary.yaml
        yq -i '.endpointWatcher.local.fileSystemName = "{{ _dr_fsx_name }}"' {{ _project_root }}/values-secondary.yaml
        yq -i '.endpointWatcher.local.region = "{{ dr_cluster.region }}"' {{ _project_root }}/values-secondary.yaml
        yq -i '.endpointWatcher.local.svmName = "SVM2"' {{ _project_root }}/values-secondary.yaml
        yq -i '.endpointWatcher.peer.fileSystemName = "{{ _prod_fsx_name }}"' {{ _project_root }}/values-secondary.yaml
        yq -i '.endpointWatcher.peer.region = "{{ prod_cluster.region }}"' {{ _project_root }}/values-secondary.yaml
        yq -i '.endpointWatcher.peer.svmName = "SVM1"' {{ _project_root }}/values-secondary.yaml
      changed_when: true

# -----------------------------------------------------------------------------
# Play 6: Route53 DR Failover
# -----------------------------------------------------------------------------
# Enabled by default. The failover domain is auto-derived from the production
# cluster's base domain (e.g. primary.sandbox.example.com → dr.sandbox.example.com).
# Override with dr_failover_domain in crossplane-vars.yml.
# Hosted zone ID: set dr_failover_hosted_zone_id, or leave empty and enable
# dr_failover_discover_hosted_zone_id (requires aws CLI + credentials for the account).
# Optional dr_failover_hosted_zone_lookup_name if the zone apex differs from the failover domain.
# Disable with: -e route53_failover_enabled=false
# -----------------------------------------------------------------------------
- name: Configure Route53 DR Failover values
  hosts: localhost
  gather_facts: false
  vars:
    _project_root: "{{ playbook_dir }}/.."
  tasks:
    - name: Skip Route53 if explicitly disabled
      ansible.builtin.meta: end_play
      when: not (route53_failover_enabled | default(true) | bool)

    - name: Discover primary cluster base domain
      ansible.builtin.shell: >-
        KUBECONFIG="{{ prod_kubeconfig }}" oc get dns.config/cluster
        -o jsonpath='{.spec.baseDomain}'
      register: _prod_base_domain
      changed_when: false

    - name: Discover secondary cluster base domain
      ansible.builtin.shell: >-
        KUBECONFIG="{{ dr_kubeconfig }}" oc get dns.config/cluster
        -o jsonpath='{.spec.baseDomain}'
      register: _dr_base_domain
      changed_when: false

    - name: Derive failover domain
      ansible.builtin.set_fact:
        _failover_domain: "{{ (dr_failover_domain | default('')) or ('dr.' ~ _prod_base_domain.stdout.split('.', 1)[1]) }}"

    - name: Discover primary cluster ingress hostname
      ansible.builtin.shell: >-
        KUBECONFIG="{{ prod_kubeconfig }}" oc get ingress.config cluster
        -o jsonpath='{.spec.domain}'
      register: _prod_ingress_domain
      changed_when: false

    - name: Discover secondary cluster ingress hostname
      ansible.builtin.shell: >-
        KUBECONFIG="{{ dr_kubeconfig }}" oc get ingress.config cluster
        -o jsonpath='{.spec.domain}'
      register: _dr_ingress_domain
      changed_when: false

    - name: Set ingress hostnames
      ansible.builtin.set_fact:
        _prod_router_hostname: "router-default.{{ _prod_ingress_domain.stdout }}"
        _dr_router_hostname: "router-default.{{ _dr_ingress_domain.stdout }}"

    - name: Compute DNS apex for Route53 hosted zone lookup
      ansible.builtin.set_fact:
        _route53_zone_lookup_name: >-
          {{ dr_failover_hosted_zone_lookup_name
             if (dr_failover_hosted_zone_lookup_name | default('') | trim | length > 0)
             else _failover_domain }}

    - name: Resolve Route53 hosted zone ID (explicit var, or automated discovery)
      ansible.builtin.shell: |
        set -euo pipefail
        # No manual zone ID: discover via AWS API (requires aws CLI + account credentials).
        if [ -n "${ZONE_ID_EXPLICIT}" ]; then
          printf '%s' "${ZONE_ID_EXPLICIT}"
          exit 0
        fi
        if [ "${DISCOVER}" != "true" ]; then
          exit 0
        fi
        lookup_zone() {
          local DOMAIN="$1"
          [ -z "$DOMAIN" ] && return 0
          aws route53 list-hosted-zones-by-name \
            --dns-name "$DOMAIN" \
            --query "HostedZones[?Name=='${DOMAIN}.'].Id" \
            --output text 2>/dev/null | head -1 | sed 's|/hostedzone/||' || true
        }
        ZID=""
        FIRST="${ZONE_LOOKUP_NAME}"
        if [ -n "${FIRST}" ]; then
          ZID=$(lookup_zone "${FIRST}")
        fi
        # If failover domain is dr.example.com but the hosted zone is example.com, try parent apex.
        if [ -z "${ZID}" ] && [ "${FALLBACK_PARENT:-true}" = "true" ] && [[ "${FIRST}" == dr.* ]]; then
          PARENT="${FIRST#dr.}"
          if [ -n "${PARENT}" ]; then
            ZID=$(lookup_zone "${PARENT}")
          fi
        fi
        printf '%s' "${ZID:-}"
      environment:
        ZONE_ID_EXPLICIT: "{{ dr_failover_hosted_zone_id | default('') | trim }}"
        DISCOVER: "{{ dr_failover_discover_hosted_zone_id | default(true) | bool | lower }}"
        ZONE_LOOKUP_NAME: "{{ _route53_zone_lookup_name }}"
        FALLBACK_PARENT: "{{ dr_failover_discover_hosted_zone_parent | default(true) | bool | lower }}"
        AWS_DEFAULT_REGION: "{{ prod_cluster.region }}"
      register: _r53_zone_resolve
      changed_when: false

    - name: Write route53Failover values to values-hub.yaml
      ansible.builtin.shell: |
        yq -i '.route53Failover.enabled = true' {{ _project_root }}/values-hub.yaml
        yq -i '.route53Failover.region = "{{ prod_cluster.region }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.route53Failover.domain = "{{ _failover_domain }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.route53Failover.createHostedZone = {{ not (_r53_zone_resolve.stdout | trim | length > 0) | lower }}' {{ _project_root }}/values-hub.yaml
        yq -i '.route53Failover.hostedZoneId = "{{ _r53_zone_resolve.stdout | trim }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.global.clusterDomain = "{{ _prod_ingress_domain.stdout }}"' {{ _project_root }}/values-global.yaml
        yq -i '.global.drClusterDomain = "{{ _dr_ingress_domain.stdout }}"' {{ _project_root }}/values-global.yaml
        yq -i '.route53Failover.healthCheckPath = "{{ dr_failover_health_check_path | default("/") }}"' {{ _project_root }}/values-hub.yaml
        ATTACH="{{ dr_failover_attach_secondary_health_check | default(false) | bool | lower }}"
        yq -i ".route53Failover.attachSecondaryHealthCheck = ${ATTACH}" {{ _project_root }}/values-hub.yaml
        yq -i '.route53Failover.followPromotedDns.enabled = {{ dr_follow_promoted_dns | default(true) | bool | lower }}' {{ _project_root }}/values-hub.yaml
        yq -i '.route53Failover.apps = {{ dr_failover_apps | default([]) | to_json }}' {{ _project_root }}/values-hub.yaml
        yq -i '.drDnsReconciler.domain = "{{ _failover_domain }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.drDnsReconciler.hostedZoneId = "{{ _r53_zone_resolve.stdout | trim }}"' {{ _project_root }}/values-hub.yaml
      changed_when: true

    - name: Enable drFailover in values-global.yaml
      ansible.builtin.shell: |
        yq -i '.drFailover.enabled = true' {{ _project_root }}/values-global.yaml
        yq -i '.drFailover.domain = "{{ _failover_domain }}"' {{ _project_root }}/values-global.yaml
      changed_when: true

    - name: Set Route53 hosted zone summary for display
      ansible.builtin.set_fact:
        _r53_hz_msg: >-
          {{ (_r53_zone_resolve.stdout | trim | length > 0) | ternary(_r53_zone_resolve.stdout | trim,
            '(empty — Crossplane will create a zone if createHostedZone is true)') }}

    - name: Display Route53 failover summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Route53 DR Failover Values Written"
          - "=========================================="
          - "  Domain: {{ _failover_domain }}"
          - "  Zone lookup (then dr.* parent if needed): {{ _route53_zone_lookup_name }}"
          - "  Hosted zone ID: {{ _r53_hz_msg }}"
          - "  drDnsReconciler (values-hub): domain + hostedZoneId set to match"
          - "  Primary router:   {{ _prod_router_hostname }}"
          - "  Secondary router: {{ _dr_router_hostname }}"
          - "  Apps: {{ dr_failover_apps | default([]) | map(attribute='name') | list }}"
          - "=========================================="

# -----------------------------------------------------------------------------
# Play 7: Summary
# -----------------------------------------------------------------------------
- name: Crossplane Setup Summary
  hosts: localhost
  gather_facts: false
  vars:
    _prod_fsx_name: "{{ prod_file_system_name | default(prod_cluster.cluster_name ~ '-' ~ prod_cluster.region ~ '-fsx') }}"
    _dr_fsx_name: "{{ dr_file_system_name | default(dr_cluster.cluster_name ~ '-' ~ dr_cluster.region ~ '-fsx') }}"
  tasks:
    - name: Display summary
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - "  Crossplane DR Infrastructure - Values Written"
          - "============================================================"
          - ""
          - "  PRODUCTION (values-hub.yaml)"
          - "    FSx Name:      {{ _prod_fsx_name }}"
          - "    Region:        {{ prod_cluster.region }}"
          - "    VPC:           {{ prod_cluster.vpc_id }} ({{ prod_cluster.vpc_cidr }})"
          - "    Subnets:       {{ prod_cluster.subnet_ids[:2] }}"
          - "    SVM:           SVM1"
          - ""
          - "  DR (values-secondary.yaml)"
          - "    FSx Name:      {{ _dr_fsx_name }}"
          - "    Region:        {{ dr_cluster.region }}"
          - "    VPC:           {{ dr_cluster.vpc_id }} ({{ dr_cluster.vpc_cidr }})"
          - "    Subnets:       {{ dr_cluster.subnet_ids[:2] }}"
          - "    SVM:           SVM2"
          - ""
          - "  ROUTE53 FAILOVER"
          - "    Domain:        {{ _failover_domain | default('disabled') }}"
          - "    Apps:          {{ dr_failover_apps | default([]) | map(attribute='name') | list }}"
          - ""
          - "  NEXT STEPS"
          - "    1. Review the updated values files"
          - "    2. Commit and push to trigger ArgoCD sync"
          - "    3. Crossplane will create all AWS resources"
          - "    4. Monitor: kubectl get managed"
          - "============================================================"
