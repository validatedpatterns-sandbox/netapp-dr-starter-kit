---
# =============================================================================
# NetApp DR Starter Kit - Main Playbook
# =============================================================================
#
# This playbook orchestrates the complete DR infrastructure setup:
#   0. Reads values-trident.yaml for the terraform state bucket name
#   1. Discovers prod and DR cluster info (names, regions, VPC CIDRs)
#   2. Creates S3 bucket + DynamoDB table for Terraform remote state
#   3. Peers the VPCs of the two clusters
#   4. Creates FSx for NetApp ONTAP filesystems in each region
#
# The FSx filesystems are named: <cluster_name>-<region>-fsx
# and are intended for use with Trident / Trident Protect for DR replication.
#
# Usage:
#   ansible-playbook ansible/dr-setup.yaml \
#     -e @ansible/dr-vars.yml \
#     -e prod_kubeconfig=/path/to/prod/kubeconfig \
#     -e dr_kubeconfig=/path/to/dr/kubeconfig
#
# =============================================================================

# -----------------------------------------------------------------------------
# Play 1: Load values-trident.yaml and Discover Production Cluster
# -----------------------------------------------------------------------------
- name: Discover Production Cluster
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Load values-trident.yaml
      ansible.builtin.set_fact:
        _values_trident: "{{ lookup('file', playbook_dir ~ '/../values-trident.yaml') | from_yaml }}"

    - name: Set terraform state bucket from values-trident.yaml
      ansible.builtin.set_fact:
        terraform_state_bucket: "{{ terraform_state_bucket | default(_values_trident.terraform.state.bucket) }}"
        cacheable: true

    - name: Display state bucket
      ansible.builtin.debug:
        msg: "Terraform state bucket (from values-trident.yaml): {{ terraform_state_bucket }}"

    - name: Validate prod_kubeconfig is provided
      ansible.builtin.fail:
        msg: "prod_kubeconfig is required. Pass it via -e prod_kubeconfig=/path/to/kubeconfig"
      when: prod_kubeconfig is not defined or prod_kubeconfig == ''

    - name: Discover production cluster
      ansible.builtin.include_role:
        name: cluster_discovery
      vars:
        cluster_discovery_kubeconfig: "{{ prod_kubeconfig }}"
        cluster_discovery_label: "Production"
        cluster_discovery_name_override: "{{ prod_cluster_name_override | default('') }}"
        cluster_discovery_region_override: "{{ prod_region_override | default('') }}"
        cluster_discovery_vpc_cidr_override: "{{ prod_vpc_cidr_override | default('') }}"
        cluster_discovery_vpc_name_override: "{{ prod_vpc_name_override | default('') }}"

    - name: Store production cluster info
      ansible.builtin.set_fact:
        prod_cluster: "{{ cluster_discovery_result }}"
        cacheable: true

# -----------------------------------------------------------------------------
# Play 2: Discover DR Cluster
# -----------------------------------------------------------------------------
- name: Discover DR Cluster
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Validate dr_kubeconfig is provided
      ansible.builtin.fail:
        msg: "dr_kubeconfig is required. Pass it via -e dr_kubeconfig=/path/to/kubeconfig"
      when: dr_kubeconfig is not defined or dr_kubeconfig == ''

    - name: Discover DR cluster
      ansible.builtin.include_role:
        name: cluster_discovery
      vars:
        cluster_discovery_kubeconfig: "{{ dr_kubeconfig }}"
        cluster_discovery_label: "DR"
        cluster_discovery_name_override: "{{ dr_cluster_name_override | default('') }}"
        cluster_discovery_region_override: "{{ dr_region_override | default('') }}"
        cluster_discovery_vpc_cidr_override: "{{ dr_vpc_cidr_override | default('') }}"
        cluster_discovery_vpc_name_override: "{{ dr_vpc_name_override | default('') }}"

    - name: Store DR cluster info
      ansible.builtin.set_fact:
        dr_cluster: "{{ cluster_discovery_result }}"
        cacheable: true

# -----------------------------------------------------------------------------
# Play 3: Bootstrap Terraform State Backend (S3 + DynamoDB)
#   Only runs on create — destroy is handled separately via
#   "make destroy-terraform-state" to prevent accidental deletion.
# -----------------------------------------------------------------------------
- name: Create Terraform State Backend
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Skip state backend creation if destroying
      ansible.builtin.meta: end_play
      when: destroy_resources | default(false)

    - name: Create S3 bucket and DynamoDB table for Terraform state
      ansible.builtin.include_role:
        name: terraform_state
      vars:
        terraform_state_region: "{{ prod_cluster.region }}"
        terraform_state_tags: "{{ resource_tags }}"

# -----------------------------------------------------------------------------
# Play 4: VPC Peering (create only — destroy is in the destroy sequence)
# -----------------------------------------------------------------------------
- name: Peer VPCs between Production and DR
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Skip VPC peering if destroying
      ansible.builtin.meta: end_play
      when: destroy_resources | default(false)

    - name: Display peering summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "VPC Peering Setup"
          - "=========================================="
          - "Prod: {{ prod_cluster.cluster_name }} in {{ prod_cluster.region }} ({{ prod_cluster.vpc_cidr }})"
          - "DR:   {{ dr_cluster.cluster_name }} in {{ dr_cluster.region }} ({{ dr_cluster.vpc_cidr }})"
          - "=========================================="

    - name: Peer VPCs via Terraform
      ansible.builtin.include_role:
        name: vpc_peering_terraform
      vars:
        vpc_peering_terraform_state_bucket: "{{ terraform_state_bucket }}"
        vpc_peering_terraform_state_dynamodb_table: "{{ terraform_state_dynamodb_table }}"
        vpc_peering_terraform_tags: "{{ resource_tags }}"

# -----------------------------------------------------------------------------
# Play 5: Create FSx ONTAP in Both Regions (parallel)
#
# FSx creation takes 20-40 minutes. Both filesystems are independent, so
# we prepare both (setup, init, plan) sequentially, then fire both applies
# in parallel using async, cutting total wall-clock time roughly in half.
# -----------------------------------------------------------------------------
- name: Create FSx ONTAP Filesystems (parallel)
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Skip FSx creation if destroy is requested
      ansible.builtin.meta: end_play
      when: destroy_resources | default(false)

    # --- Load FSx password ---
    - name: Load FSx password from ~/.fsx file
      when: fsx_admin_password is not defined or fsx_admin_password == ''
      block:
        - name: Check if ~/.fsx file exists
          ansible.builtin.stat:
            path: "{{ '~/.fsx' | expanduser }}"
          register: _fsx_file_stat

        - name: Read password from ~/.fsx file
          ansible.builtin.slurp:
            src: "{{ '~/.fsx' | expanduser }}"
          register: _fsx_file_content
          when: _fsx_file_stat.stat.exists | default(false)

        - name: Set password from ~/.fsx file
          ansible.builtin.set_fact:
            fsx_admin_password: "{{ _fsx_file_content.content | b64decode | trim }}"
            svm_admin_password: "{{ _fsx_file_content.content | b64decode | trim }}"
          when:
            - _fsx_file_stat.stat.exists | default(false)
            - _fsx_file_content.content is defined
            - fsx_admin_password is not defined or fsx_admin_password == ''

    - name: Validate FSx password is set
      ansible.builtin.fail:
        msg: |
          fsx_admin_password is required but not found.
          Please either:
            1. Create ~/.fsx file with the password: echo "MyPassword" > ~/.fsx && chmod 600 ~/.fsx
            2. Pass via command line: -e fsx_admin_password=MyPassword
      when: fsx_admin_password is not defined or fsx_admin_password == ''

    # --- Prepare Production FSx (setup, init, plan) ---
    - name: Prepare Production FSx ONTAP
      ansible.builtin.include_role:
        name: fsx_ontap_terraform
      vars:
        fsx_ontap_terraform_cluster_info: "{{ prod_cluster }}"
        fsx_ontap_terraform_label: "Production FSx"
        fsx_ontap_terraform_file_system_name_override: "{{ prod_file_system_name | default('') }}"
        fsx_ontap_terraform_state_region: "{{ prod_cluster.region }}"
        fsx_ontap_terraform_state_bucket: "{{ terraform_state_bucket }}"
        fsx_ontap_terraform_state_dynamodb_table: "{{ terraform_state_dynamodb_table }}"
        fsx_ontap_terraform_svm_name: "SVM1"
        fsx_ontap_terraform_allowed_cidrs:
          - "{{ prod_cluster.vpc_cidr }}"
          - "{{ dr_cluster.vpc_cidr }}"
        fsx_ontap_terraform_tags: "{{ resource_tags }}"
        fsx_ontap_terraform_prepare_only: true

    - name: Save Production FSx prepared state
      ansible.builtin.set_fact:
        _prod_fsx_prepared: "{{ fsx_ontap_terraform_prepared }}"

    # --- Prepare DR FSx (setup, init, plan) ---
    - name: Prepare DR FSx ONTAP
      ansible.builtin.include_role:
        name: fsx_ontap_terraform
      vars:
        fsx_ontap_terraform_cluster_info: "{{ dr_cluster }}"
        fsx_ontap_terraform_label: "DR FSx"
        fsx_ontap_terraform_file_system_name_override: "{{ dr_file_system_name | default('') }}"
        fsx_ontap_terraform_state_region: "{{ prod_cluster.region }}"
        fsx_ontap_terraform_state_bucket: "{{ terraform_state_bucket }}"
        fsx_ontap_terraform_state_dynamodb_table: "{{ terraform_state_dynamodb_table }}"
        fsx_ontap_terraform_svm_name: "SVM2"
        fsx_ontap_terraform_allowed_cidrs:
          - "{{ dr_cluster.vpc_cidr }}"
          - "{{ prod_cluster.vpc_cidr }}"
        fsx_ontap_terraform_tags: "{{ resource_tags }}"
        fsx_ontap_terraform_prepare_only: true

    - name: Save DR FSx prepared state
      ansible.builtin.set_fact:
        _dr_fsx_prepared: "{{ fsx_ontap_terraform_prepared }}"

    # --- Apply both in parallel ---
    - name: Display parallel apply notice
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Applying FSx ONTAP in PARALLEL"
          - "=========================================="
          - "  Production: {{ _prod_fsx_prepared.file_system_name }}"
          - "  DR:         {{ _dr_fsx_prepared.file_system_name }}"
          - "  This may take 20-40 minutes..."
          - "=========================================="

    - name: Apply FSx ONTAP - Production (async)
      ansible.builtin.shell: "{{ _prod_fsx_prepared.apply_cmd }}"  # noqa: command-instead-of-shell
      async: 3600
      poll: 0
      register: _prod_fsx_job
      changed_when: true
      when: not (_prod_fsx_prepared.skipped | default(false))

    - name: Apply FSx ONTAP - DR (async)
      ansible.builtin.shell: "{{ _dr_fsx_prepared.apply_cmd }}"  # noqa: command-instead-of-shell
      async: 3600
      poll: 0
      register: _dr_fsx_job
      changed_when: true
      when: not (_dr_fsx_prepared.skipped | default(false))

    # --- Wait for both to complete ---
    - name: Wait for Production FSx apply to complete
      ansible.builtin.async_status:
        jid: "{{ _prod_fsx_job.ansible_job_id }}"
      register: _prod_fsx_apply
      until: _prod_fsx_apply.finished | bool
      retries: 120
      delay: 30
      when: not (_prod_fsx_prepared.skipped | default(false))

    - name: Wait for DR FSx apply to complete
      ansible.builtin.async_status:
        jid: "{{ _dr_fsx_job.ansible_job_id }}"
      register: _dr_fsx_apply
      until: _dr_fsx_apply.finished | bool
      retries: 120
      delay: 30
      when: not (_dr_fsx_prepared.skipped | default(false))

    # --- Get outputs ---
    - name: Get Production FSx outputs
      ansible.builtin.shell: "{{ _prod_fsx_prepared.output_cmd }}"  # noqa: command-instead-of-shell
      register: _prod_fsx_outputs_raw
      changed_when: false
      when: not (_prod_fsx_prepared.skipped | default(false))

    - name: Get DR FSx outputs
      ansible.builtin.shell: "{{ _dr_fsx_prepared.output_cmd }}"  # noqa: command-instead-of-shell
      register: _dr_fsx_outputs_raw
      changed_when: false
      when: not (_dr_fsx_prepared.skipped | default(false))

    # --- Store results ---
    - name: Store Production FSx result
      ansible.builtin.set_fact:
        prod_fsx:
          file_system_id: "{{ (_prod_fsx_outputs_raw.stdout | from_json).file_system_id.value }}"
          file_system_dns_name: "{{ (_prod_fsx_outputs_raw.stdout | from_json).file_system_dns_name.value }}"
          mgmt_ips: "{{ (_prod_fsx_outputs_raw.stdout | from_json).management_endpoint_ip_addresses.value | default([]) }}"
          svm_id: "{{ (_prod_fsx_outputs_raw.stdout | from_json).svm_id.value }}"
          svm_name: "{{ (_prod_fsx_outputs_raw.stdout | from_json).svm_name.value }}"
          svm_mgmt_dns_name: "{{ (_prod_fsx_outputs_raw.stdout | from_json).svm_management_endpoint_dns_name.value | default('') }}"
          svm_mgmt_ips: "{{ (_prod_fsx_outputs_raw.stdout | from_json).svm_management_endpoint_ip_addresses.value | default([]) }}"
          intercluster_dns_name: "{{ (_prod_fsx_outputs_raw.stdout | from_json).intercluster_endpoint_dns_name.value | default('') }}"
          intercluster_ips: "{{ (_prod_fsx_outputs_raw.stdout | from_json).intercluster_endpoint_ip_addresses.value | default([]) }}"
          security_group_id: "{{ (_prod_fsx_outputs_raw.stdout | from_json).security_group_id.value }}"
          file_system_name: "{{ _prod_fsx_prepared.file_system_name }}"
        cacheable: true
      when: not (_prod_fsx_prepared.skipped | default(false))

    - name: Store DR FSx result
      ansible.builtin.set_fact:
        dr_fsx:
          file_system_id: "{{ (_dr_fsx_outputs_raw.stdout | from_json).file_system_id.value }}"
          file_system_dns_name: "{{ (_dr_fsx_outputs_raw.stdout | from_json).file_system_dns_name.value }}"
          mgmt_ips: "{{ (_dr_fsx_outputs_raw.stdout | from_json).management_endpoint_ip_addresses.value | default([]) }}"
          svm_id: "{{ (_dr_fsx_outputs_raw.stdout | from_json).svm_id.value }}"
          svm_name: "{{ (_dr_fsx_outputs_raw.stdout | from_json).svm_name.value }}"
          svm_mgmt_dns_name: "{{ (_dr_fsx_outputs_raw.stdout | from_json).svm_management_endpoint_dns_name.value | default('') }}"
          svm_mgmt_ips: "{{ (_dr_fsx_outputs_raw.stdout | from_json).svm_management_endpoint_ip_addresses.value | default([]) }}"
          intercluster_dns_name: "{{ (_dr_fsx_outputs_raw.stdout | from_json).intercluster_endpoint_dns_name.value | default('') }}"
          intercluster_ips: "{{ (_dr_fsx_outputs_raw.stdout | from_json).intercluster_endpoint_ip_addresses.value | default([]) }}"
          security_group_id: "{{ (_dr_fsx_outputs_raw.stdout | from_json).security_group_id.value }}"
          file_system_name: "{{ _dr_fsx_prepared.file_system_name }}"
        cacheable: true
      when: not (_dr_fsx_prepared.skipped | default(false))

# -----------------------------------------------------------------------------
# Play 7: Update values files with FSx management LIF IPs
# -----------------------------------------------------------------------------
- name: Update values files with FSx mgmtLIF
  hosts: localhost
  gather_facts: false
  vars:
    _project_root: "{{ playbook_dir }}/.."
  tasks:
    - name: Skip values update if destroying
      ansible.builtin.meta: end_play
      when: destroy_resources | default(false)

    - name: Set mgmtLIF and clusterLIF IPs from FSx outputs
      ansible.builtin.set_fact:
        _hub_mgmt_lif: "{{ prod_fsx.svm_mgmt_ips | first }}"
        _hub_cluster_lif: "{{ prod_fsx.mgmt_ips | first }}"
        _secondary_mgmt_lif: "{{ dr_fsx.svm_mgmt_ips | first }}"
        _secondary_cluster_lif: "{{ dr_fsx.mgmt_ips | first }}"

    - name: Update values-hub.yaml .tridentFSX
      ansible.builtin.shell: |
        yq -i '.tridentFSX.mgmtLIF = "{{ _hub_mgmt_lif }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.tridentFSX.clusterLIF = "{{ _hub_cluster_lif }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.tridentFSX.svm = "{{ prod_fsx.svm_name }}"' {{ _project_root }}/values-hub.yaml
      changed_when: true

    - name: Update values-secondary.yaml .tridentFSX
      ansible.builtin.shell: |
        yq -i '.tridentFSX.mgmtLIF = "{{ _secondary_mgmt_lif }}"' {{ _project_root }}/values-secondary.yaml
        yq -i '.tridentFSX.clusterLIF = "{{ _secondary_cluster_lif }}"' {{ _project_root }}/values-secondary.yaml
        yq -i '.tridentFSX.svm = "{{ dr_fsx.svm_name }}"' {{ _project_root }}/values-secondary.yaml
      changed_when: true

    - name: Update values-hub.yaml intercluster and peer info
      ansible.builtin.shell: |
        yq -i '.tridentFSX.interclusterIPs = {{ prod_fsx.intercluster_ips | to_json }}' {{ _project_root }}/values-hub.yaml
        yq -i '.tridentFSX.peer.mgmtLIF = "{{ _secondary_mgmt_lif }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.tridentFSX.peer.clusterLIF = "{{ _secondary_cluster_lif }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.tridentFSX.peer.svm = "{{ dr_fsx.svm_name }}"' {{ _project_root }}/values-hub.yaml
        yq -i '.tridentFSX.peer.interclusterIPs = {{ dr_fsx.intercluster_ips | to_json }}' {{ _project_root }}/values-hub.yaml
      changed_when: true

    - name: Update values-secondary.yaml intercluster and peer info
      ansible.builtin.shell: |
        yq -i '.tridentFSX.interclusterIPs = {{ dr_fsx.intercluster_ips | to_json }}' {{ _project_root }}/values-secondary.yaml
        yq -i '.tridentFSX.peer.mgmtLIF = "{{ _hub_mgmt_lif }}"' {{ _project_root }}/values-secondary.yaml
        yq -i '.tridentFSX.peer.clusterLIF = "{{ _hub_cluster_lif }}"' {{ _project_root }}/values-secondary.yaml
        yq -i '.tridentFSX.peer.svm = "{{ prod_fsx.svm_name }}"' {{ _project_root }}/values-secondary.yaml
        yq -i '.tridentFSX.peer.interclusterIPs = {{ prod_fsx.intercluster_ips | to_json }}' {{ _project_root }}/values-secondary.yaml
      changed_when: true

    - name: Display values file updates
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Values Files Updated"
          - "=========================================="
          - "  values-hub.yaml:"
          - "    tridentFSX.mgmtLIF:            {{ _hub_mgmt_lif }}"
          - "    tridentFSX.clusterLIF:         {{ _hub_cluster_lif }}"
          - "    tridentFSX.svm:                {{ prod_fsx.svm_name }}"
          - "    tridentFSX.interclusterIPs:    {{ prod_fsx.intercluster_ips }}"
          - "    tridentFSX.peer.mgmtLIF:       {{ _secondary_mgmt_lif }}"
          - "    tridentFSX.peer.clusterLIF:    {{ _secondary_cluster_lif }}"
          - "    tridentFSX.peer.svm:            {{ dr_fsx.svm_name }}"
          - "    tridentFSX.peer.interclusterIPs: {{ dr_fsx.intercluster_ips }}"
          - ""
          - "  values-secondary.yaml:"
          - "    tridentFSX.mgmtLIF:            {{ _secondary_mgmt_lif }}"
          - "    tridentFSX.clusterLIF:         {{ _secondary_cluster_lif }}"
          - "    tridentFSX.svm:                {{ dr_fsx.svm_name }}"
          - "    tridentFSX.interclusterIPs:    {{ dr_fsx.intercluster_ips }}"
          - "    tridentFSX.peer.mgmtLIF:       {{ _hub_mgmt_lif }}"
          - "    tridentFSX.peer.clusterLIF:    {{ _hub_cluster_lif }}"
          - "    tridentFSX.peer.svm:            {{ prod_fsx.svm_name }}"
          - "    tridentFSX.peer.interclusterIPs: {{ prod_fsx.intercluster_ips }}"
          - "=========================================="

# -----------------------------------------------------------------------------
# Play 8: Route53 DR Failover (optional — only when dr_failover_domain is set)
# -----------------------------------------------------------------------------
- name: Configure Route53 DR Failover
  hosts: localhost
  gather_facts: false
  vars:
    _project_root: "{{ playbook_dir }}/.."
  tasks:
    - name: Skip Route53 if destroying
      ansible.builtin.meta: end_play
      when: destroy_resources | default(false)

    - name: Skip Route53 if domain not configured
      ansible.builtin.meta: end_play
      when: dr_failover_domain | default('') == ''

    - name: Discover primary cluster ingress hostname
      ansible.builtin.shell: >-
        KUBECONFIG="{{ prod_kubeconfig }}" oc get ingress.config cluster
        -o jsonpath='{.spec.domain}'
      register: _prod_ingress_domain
      changed_when: false

    - name: Discover secondary cluster ingress hostname
      ansible.builtin.shell: >-
        KUBECONFIG="{{ dr_kubeconfig }}" oc get ingress.config cluster
        -o jsonpath='{.spec.domain}'
      register: _dr_ingress_domain
      changed_when: false

    - name: Set ingress hostnames
      ansible.builtin.set_fact:
        _prod_router_hostname: "router-default.{{ _prod_ingress_domain.stdout }}"
        _dr_router_hostname: "router-default.{{ _dr_ingress_domain.stdout }}"

    - name: Deploy Route53 failover via Terraform
      ansible.builtin.include_role:
        name: route53_failover_terraform
      vars:
        route53_failover_domain: "{{ dr_failover_domain }}"
        route53_failover_create_hosted_zone: "{{ not (dr_failover_hosted_zone_id | default('') | length > 0) }}"
        route53_failover_hosted_zone_id: "{{ dr_failover_hosted_zone_id | default('') }}"
        route53_failover_state_bucket: "{{ terraform_state_bucket }}"
        route53_failover_state_region: "{{ prod_cluster.region }}"
        route53_failover_state_dynamodb_table: "{{ terraform_state_dynamodb_table }}"
        route53_failover_primary_ingress_hostname: "{{ _prod_router_hostname }}"
        route53_failover_secondary_ingress_hostname: "{{ _dr_router_hostname }}"
        route53_failover_primary_health_fqdn: "{{ _prod_router_hostname }}"
        route53_failover_secondary_health_fqdn: "{{ _dr_router_hostname }}"
        route53_failover_apps: "{{ dr_failover_apps | default([]) }}"
        route53_failover_health_check_path: "{{ dr_failover_health_check_path | default('/') }}"
        route53_failover_attach_secondary_health_check: "{{ dr_failover_attach_secondary_health_check | default(false) | bool }}"
        route53_failover_tags: "{{ resource_tags }}"

    - name: Enable drFailover in values-global.yaml
      ansible.builtin.shell: |
        yq -i '.drFailover.enabled = true' {{ _project_root }}/values-global.yaml
        yq -i '.drFailover.domain = "{{ dr_failover_domain }}"' {{ _project_root }}/values-global.yaml
      changed_when: true

    - name: Display Route53 failover summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Route53 DR Failover Configured"
          - "=========================================="
          - "  Domain: {{ dr_failover_domain }}"
          - "  Primary router:   {{ _prod_router_hostname }}"
          - "  Secondary router: {{ _dr_router_hostname }}"
          - ""
          - "  Failover URLs:"
          - "  {% for app in dr_failover_apps | default([]) %}  {{ app.name }}.{{ dr_failover_domain }}{% endfor %}"
          - ""
          - "  Ensure DNS delegation is configured for"
          - "  {{ dr_failover_domain }} in your parent zone."
          - "=========================================="
      when: route53_failover_result is defined

# -----------------------------------------------------------------------------
# Play 9: Summary
# -----------------------------------------------------------------------------
- name: DR Infrastructure Summary
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Skip summary if destroy was requested
      ansible.builtin.meta: end_play
      when: destroy_resources | default(false)

    - name: Display complete DR infrastructure summary
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - "  NetApp DR Infrastructure - Setup Complete"
          - "============================================================"
          - ""
          - "  TERRAFORM STATE"
          - "    S3 Bucket:   {{ terraform_state_bucket }}"
          - "    DynamoDB:    {{ terraform_state_dynamodb_table | default('terraform-state-lock') }}"
          - ""
          - "  PRODUCTION CLUSTER"
          - "    Cluster:     {{ prod_cluster.cluster_name }}"
          - "    Region:      {{ prod_cluster.region }}"
          - "    VPC:         {{ prod_cluster.vpc_id }} ({{ prod_cluster.vpc_cidr }})"
          - "    FSx Name:    {{ prod_fsx.file_system_name }}"
          - "    FSx ID:      {{ prod_fsx.file_system_id }}"
          - "    SVM Mgmt:    {{ prod_fsx.svm_mgmt_dns_name }}"
          - "    Intercluster: {{ prod_fsx.intercluster_dns_name }}"
          - ""
          - "  DR CLUSTER"
          - "    Cluster:     {{ dr_cluster.cluster_name }}"
          - "    Region:      {{ dr_cluster.region }}"
          - "    VPC:         {{ dr_cluster.vpc_id }} ({{ dr_cluster.vpc_cidr }})"
          - "    FSx Name:    {{ dr_fsx.file_system_name }}"
          - "    FSx ID:      {{ dr_fsx.file_system_id }}"
          - "    SVM Mgmt:    {{ dr_fsx.svm_mgmt_dns_name }}"
          - "    Intercluster: {{ dr_fsx.intercluster_dns_name }}"
          - ""
          - "  NEXT STEPS"
          - "    1. Configure Trident backends on both clusters using"
          - "       the SVM management DNS names above"
          - "    2. Configure Trident Protect AppMirrorRelationships"
          - "       for cross-region DR replication"
          - "    3. The FSx intercluster endpoints above are used by"
          - "       SnapMirror for data replication between the"
          - "       ONTAP filesystems"
          - "============================================================"

# -----------------------------------------------------------------------------
# Destroy Plays (only run when destroy_resources=true)
#
# Order matters — reverse of creation:
#   0. Remove ONTAP SVM/cluster peering (required before SVM deletion)
#   1. Scrub AppVault S3 bucket (dr-metadata + snapshot archives)
#   2. Clean up remaining FSx volumes via AWS API
#   3. FSx filesystems (both regions)
#   4. Route53 DR failover (if configured)
#   5. VPC peering
#
# Note: The Terraform state backend (S3 + DynamoDB) is NOT destroyed here.
# Use "make destroy-terraform-state" separately if you want to remove it.
# -----------------------------------------------------------------------------
- name: Remove ONTAP Peering Relationships
  hosts: localhost
  gather_facts: false
  vars:
    _project_root: "{{ playbook_dir }}/.."
    _prod_fsx_name: "{{ prod_file_system_name | default(prod_cluster.cluster_name ~ '-' ~ prod_cluster.region ~ '-fsx') }}"
    _dr_fsx_name: "{{ dr_file_system_name | default(dr_cluster.cluster_name ~ '-' ~ dr_cluster.region ~ '-fsx') }}"
  tasks:
    - name: Skip if not destroying
      ansible.builtin.meta: end_play
      when: not (destroy_resources | default(false))

    - name: Load FSx password from ~/.fsx file
      when: fsx_admin_password is not defined or fsx_admin_password == ''
      block:
        - name: Check if ~/.fsx file exists
          ansible.builtin.stat:
            path: "{{ '~/.fsx' | expanduser }}"
          register: _fsx_file_stat

        - name: Read password from ~/.fsx file
          ansible.builtin.slurp:
            src: "{{ '~/.fsx' | expanduser }}"
          register: _fsx_file_content
          when: _fsx_file_stat.stat.exists | default(false)

        - name: Set password from ~/.fsx file
          ansible.builtin.set_fact:
            fsx_admin_password: "{{ _fsx_file_content.content | b64decode | trim }}"
            svm_admin_password: "{{ _fsx_file_content.content | b64decode | trim }}"
          when:
            - _fsx_file_stat.stat.exists | default(false)
            - _fsx_file_content.content is defined
            - fsx_admin_password is not defined or fsx_admin_password == ''

    - name: Read Production cluster management LIF  # noqa: command-instead-of-shell
      ansible.builtin.shell: >-
        yq '.tridentFSX.clusterLIF // ""' {{ _project_root }}/values-hub.yaml
      register: _prod_lif_raw
      changed_when: false
      failed_when: false

    - name: Read DR cluster management LIF  # noqa: command-instead-of-shell
      ansible.builtin.shell: >-
        yq '.tridentFSX.clusterLIF // ""' {{ _project_root }}/values-secondary.yaml
      register: _dr_lif_raw
      changed_when: false
      failed_when: false

    - name: Set cluster LIF facts
      ansible.builtin.set_fact:
        _prod_cluster_lif: "{{ _prod_lif_raw.stdout | default('') | trim }}"
        _dr_cluster_lif: "{{ _dr_lif_raw.stdout | default('') | trim }}"

    - name: Display peering teardown info
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Removing ONTAP Peering Before Destroy"
          - "=========================================="
          - "  Production clusterLIF: {{ _prod_cluster_lif }}"
          - "  DR clusterLIF:         {{ _dr_cluster_lif }}"
          - "  Production FSx SG:     {{ _prod_fsx_name }}-sg"
          - "  DR FSx SG:             {{ _dr_fsx_name }}-sg"
          - "=========================================="

    # ------------------------------------------------------------------
    # Ensure FSx security groups have the minimum rules needed for
    # ONTAP management API access and intercluster communication.
    # A prior partial Terraform destroy may have removed these rules,
    # leaving the cluster peers unable to communicate and blocking
    # SVM peer deletion (which deadlocks SVM/filesystem destroy).
    # ------------------------------------------------------------------
    - name: Ensure FSx security group connectivity rules
      ansible.builtin.shell: |
        set -o pipefail
        SG_NAME="{{ item.sg_name }}"
        REGION="{{ item.region }}"

        SG_ID=$(aws ec2 describe-security-groups --region ${REGION} \
          --filters "Name=group-name,Values=${SG_NAME}" \
          --query 'SecurityGroups[0].GroupId' --output text 2>/dev/null)

        if [ -z "${SG_ID}" ] || [ "${SG_ID}" = "None" ]; then
          echo "SKIP: Security group ${SG_NAME} not found in ${REGION}"
          exit 0
        fi

        echo "SG_ID=${SG_ID}"
        ADDED=""

        aws ec2 authorize-security-group-egress --region ${REGION} --group-id ${SG_ID} \
          --ip-permissions 'IpProtocol=-1,IpRanges=[{CidrIp=0.0.0.0/0}]' 2>/dev/null && ADDED="${ADDED} egress-all"

        for CIDR in "{{ prod_cluster.vpc_cidr }}" "{{ dr_cluster.vpc_cidr }}"; do
          for PORT in 443 11104 11105; do
            aws ec2 authorize-security-group-ingress --region ${REGION} --group-id ${SG_ID} \
              --protocol tcp --port ${PORT} --cidr ${CIDR} 2>/dev/null && ADDED="${ADDED} ${PORT}/${CIDR}"
          done
        done

        if [ -n "${ADDED}" ]; then
          echo "Restored missing rules:${ADDED}"
        else
          echo "All required connectivity rules already present"
        fi
      loop:
        - sg_name: "{{ _prod_fsx_name }}-sg"
          region: "{{ prod_cluster.region }}"
        - sg_name: "{{ _dr_fsx_name }}-sg"
          region: "{{ dr_cluster.region }}"
      loop_control:
        label: "{{ item.sg_name }}"
      register: _sg_ensure
      changed_when: "'Restored missing rules' in (item.stdout | default(''))"
      failed_when: false

    - name: Display SG rule restoration results
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines | default(['(skipped)']) }}"
      loop: "{{ _sg_ensure.results }}"
      loop_control:
        label: "{{ item.item.sg_name }}"
      when: item.stdout is defined

    - name: Wait for restored security group rules to take effect  # noqa: no-handler
      ansible.builtin.pause:
        seconds: 10
      when: _sg_ensure.changed | default(false)

    # ------------------------------------------------------------------
    # Tear down ONTAP peering on each side. The script runs inside the
    # cluster (via oc run) so it can reach the FSx management LIFs
    # which are only accessible from within the VPC.
    # ------------------------------------------------------------------
    - name: Write ONTAP unpeer script
      ansible.builtin.copy:
        dest: /tmp/ontap-unpeer.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -o pipefail
          MGMT="${ONTAP_MGMT}"
          AUTH="${ONTAP_AUTH}"

          # Use python for JSON parsing (always available) instead of jq
          json_val() { python3 -c "import sys,json; d=json.load(sys.stdin); print($1)" 2>/dev/null; }
          json_arr() { python3 -c "import sys,json; d=json.load(sys.stdin)
          for r in d.get('records',[]): print($1)" 2>/dev/null; }

          api_get()  { curl -sk -u "${AUTH}" "https://${MGMT}$1" 2>/dev/null; }
          api_del()  { curl -sk -u "${AUTH}" -X DELETE "https://${MGMT}$1" 2>/dev/null; }
          api_patch() { curl -sk -u "${AUTH}" -X PATCH -H 'Content-Type: application/json' -d "$2" "https://${MGMT}$1" 2>/dev/null; }

          echo "=== Testing connectivity to ${MGMT} ==="
          HTTP_CODE=$(curl -sk -o /dev/null -w '%{http_code}' --connect-timeout 10 \
            -u "${AUTH}" "https://${MGMT}/api/cluster" 2>/dev/null || echo "000")
          if [ "${HTTP_CODE}" = "000" ]; then
            echo "WARNING: Cannot reach FSx management at ${MGMT}"
            echo "Peering teardown skipped"
            exit 0
          fi
          echo "Connected (HTTP ${HTTP_CODE})"

          # ---------------------------------------------------------------
          # 1. Clean up SnapMirror relationships
          # ---------------------------------------------------------------
          echo "=== Cleaning up SnapMirror relationships ==="
          SM_UUIDS=$(api_get "/api/snapmirror/relationships?fields=uuid,state" \
            | json_arr "r.get('uuid','')")

          if [ -z "${SM_UUIDS}" ]; then
            echo "  No SnapMirror relationships found"
          else
            for SM_UUID in ${SM_UUIDS}; do
              echo "  Processing SnapMirror ${SM_UUID}..."
              SM_STATE=$(api_get "/api/snapmirror/relationships/${SM_UUID}" \
                | json_val "d.get('state','unknown')")
              echo "    State: ${SM_STATE}"

              if [ "${SM_STATE}" != "broken_off" ] && [ "${SM_STATE}" != "uninitialized" ]; then
                echo "    Attempting quiesce + break..."
                api_patch "/api/snapmirror/relationships/${SM_UUID}" '{"state":"paused"}' >/dev/null
                sleep 3
                api_patch "/api/snapmirror/relationships/${SM_UUID}" '{"state":"broken_off"}' >/dev/null
                sleep 2
              fi

              echo "    Deleting relationship (destination_only)..."
              RESP=$(api_del "/api/snapmirror/relationships/${SM_UUID}?destination_only=true")
              ERR=$(echo "${RESP}" | json_val "d.get('error',{}).get('message','')")
              if [ -n "${ERR}" ]; then
                echo "    destination_only delete error: ${ERR}"
                echo "    Trying source_only delete..."
                api_del "/api/snapmirror/relationships/${SM_UUID}?source_only=true" >/dev/null
              fi
            done

            echo "  Polling SnapMirror removal (max 2 min)..."
            for i in $(seq 1 24); do
              SM_LEFT=$(api_get "/api/snapmirror/relationships" \
                | json_val "d.get('num_records',0)")
              if [ "${SM_LEFT}" = "0" ]; then
                echo "  All SnapMirror relationships removed"
                break
              fi
              echo "  ${SM_LEFT} relationship(s) remaining (${i}/24)..."
              sleep 5
            done
          fi

          # ---------------------------------------------------------------
          # 1b. Release orphaned SnapMirror source info
          #
          # Even after relationships are deleted, ONTAP retains source-side
          # metadata (visible via snapmirror list-destinations). FSx will
          # refuse to delete volumes that still have this metadata.
          # ---------------------------------------------------------------
          echo "=== Releasing SnapMirror source info ==="
          DEST_LINES=$(api_get "/api/private/cli/snapmirror/list-destinations?fields=source-path,destination-path" \
            | json_arr "r.get('source_path','')+'|'+r.get('destination_path','')")

          if [ -z "${DEST_LINES}" ]; then
            echo "  No SnapMirror source entries found"
          else
            echo "${DEST_LINES}" | while IFS='|' read -r SRC_PATH DST_PATH; do
              echo "  Releasing ${SRC_PATH} -> ${DST_PATH}..."
              api_get "" >/dev/null 2>&1  # no-op to keep auth warm
              RESP=$(curl -sk -u "${AUTH}" -X POST -H 'Content-Type: application/json' \
                -d "{\"source_path\": \"${SRC_PATH}\", \"destination_path\": \"${DST_PATH}\", \"relationship_info_only\": true}" \
                "https://${MGMT}/api/private/cli/snapmirror/release" 2>/dev/null)
              ERR=$(echo "${RESP}" | json_val "d.get('error',{}).get('message','')")
              if [ -n "${ERR}" ]; then
                echo "    ${ERR}"
              else
                echo "    Released"
              fi
            done

            echo "  Polling release completion (max 1 min)..."
            for i in $(seq 1 12); do
              LEFT=$(api_get "/api/private/cli/snapmirror/list-destinations" \
                | json_val "d.get('num_records',0)")
              if [ "${LEFT}" = "0" ]; then
                echo "  All SnapMirror source info released"
                break
              fi
              echo "  ${LEFT} entry(ies) remaining (${i}/12)..."
              sleep 5
            done
          fi

          # ---------------------------------------------------------------
          # 2. Delete non-root volumes
          #
          # FSx refuses to delete an SVM that still has non-root volumes.
          # We must offline and delete them via the ONTAP API before
          # Terraform can destroy the SVM/filesystem.
          # ---------------------------------------------------------------
          echo "=== Deleting non-root volumes ==="
          VOL_LINES=$(api_get "/api/storage/volumes?is_svm_root=false&fields=uuid,name,state,type" \
            | json_arr "r.get('uuid','')+'|'+r.get('name','')+'|'+r.get('state','')+'|'+r.get('type','')")

          if [ -z "${VOL_LINES}" ]; then
            echo "  No non-root volumes found"
          else
            echo "${VOL_LINES}" | while IFS='|' read -r V_UUID V_NAME V_STATE V_TYPE; do
              echo "  Volume: ${V_NAME} (${V_UUID}) state=${V_STATE} type=${V_TYPE}"

              if [ "${V_TYPE}" = "dp" ]; then
                echo "    Converting DP volume to RW..."
                api_patch "/api/storage/volumes/${V_UUID}" '{"type":"rw"}' >/dev/null 2>&1
                sleep 2
              fi

              echo "    Unmounting..."
              api_patch "/api/storage/volumes/${V_UUID}" '{"nas":{"path":""}}' >/dev/null 2>&1
              sleep 1

              echo "    Offlining..."
              api_patch "/api/storage/volumes/${V_UUID}" '{"state":"offline"}' >/dev/null 2>&1
              sleep 2

              echo "    Deleting..."
              DEL_RESP=$(api_del "/api/storage/volumes/${V_UUID}")
              DEL_ERR=$(echo "${DEL_RESP}" | json_val "d.get('error',{}).get('message','')")
              if [ -n "${DEL_ERR}" ]; then
                echo "    ONTAP delete failed: ${DEL_ERR}"
                echo "    Will retry via AWS FSx API later"
              else
                echo "    Deleted successfully"
              fi
            done

            echo "  Waiting for volume deletions to complete..."
            for i in $(seq 1 30); do
              VOL_LEFT=$(api_get "/api/storage/volumes?is_svm_root=false" \
                | json_val "d.get('num_records',0)")
              if [ "${VOL_LEFT}" = "0" ]; then
                echo "  All non-root volumes deleted"
                break
              fi
              echo "  ${VOL_LEFT} volume(s) remaining (${i}/30)..."
              sleep 10
            done
          fi

          # ---------------------------------------------------------------
          # 3. Delete SVM peers
          # ---------------------------------------------------------------
          echo "=== Deleting SVM peers ==="
          for UUID in $(api_get "/api/svm/peers?fields=uuid" \
            | json_arr "r.get('uuid','')"); do
            echo "  DELETE SVM peer ${UUID}..."
            api_del "/api/svm/peers/${UUID}" >/dev/null
          done

          echo "  Polling SVM peer removal (max 2 min)..."
          for i in $(seq 1 24); do
            COUNT=$(api_get "/api/svm/peers" | json_val "d.get('num_records',0)")
            if [ "${COUNT}" = "0" ]; then
              echo "  All SVM peers removed"
              break
            fi
            echo "  ${COUNT} SVM peer(s) remaining (${i}/24)..."
            sleep 5
          done

          # ---------------------------------------------------------------
          # 4. Delete cluster peers
          # ---------------------------------------------------------------
          echo "=== Deleting cluster peers ==="
          for ATTEMPT in 1 2 3; do
            REMAINING=0
            for UUID in $(api_get "/api/cluster/peers?fields=uuid" \
              | json_arr "r.get('uuid','')"); do
              echo "  DELETE cluster peer ${UUID} (attempt ${ATTEMPT})..."
              RESP=$(api_del "/api/cluster/peers/${UUID}")
              ERR=$(echo "${RESP}" | json_val "d.get('error',{}).get('message','')")
              if [ -n "${ERR}" ]; then
                echo "  Error: ${ERR}"
                REMAINING=$((REMAINING + 1))
              fi
            done
            [ ${REMAINING} -eq 0 ] && break
            echo "  Retrying in 10s..."
            sleep 10
          done

          SVM_LEFT=$(api_get "/api/svm/peers" | json_val "d.get('num_records',0)")
          CL_LEFT=$(api_get "/api/cluster/peers" | json_val "d.get('num_records',0)")
          VOL_LEFT=$(api_get "/api/storage/volumes?is_svm_root=false" | json_val "d.get('num_records',0)")
          echo "=== Done: ${VOL_LEFT} volume(s), ${SVM_LEFT} SVM peer(s), ${CL_LEFT} cluster peer(s) remaining ==="

    - name: Remove ONTAP peering from Production FSx (running in-cluster pod)
      ansible.builtin.shell: |
        set -o pipefail
        B64=$(base64 -w0 /tmp/ontap-unpeer.sh)
        echo ">>> Launching unpeer pod on Production cluster ({{ _prod_cluster_lif }})..."
        echo ">>> This may take 1-5 minutes if peers need to be removed."
        KUBECONFIG="{{ prod_kubeconfig }}" oc run ontap-unpeer-prod \
          --rm --restart=Never --attach=true \
          --image=image-registry.openshift-image-registry.svc:5000/openshift/tools \
          --env="ONTAP_MGMT={{ _prod_cluster_lif }}" \
          --env="ONTAP_AUTH=fsxadmin:{{ fsx_admin_password }}" \
          --env="SCRIPT_B64=${B64}" \
          --overrides='{"spec":{"terminationGracePeriodSeconds":0,"activeDeadlineSeconds":300}}' \
          -- bash -c 'echo ${SCRIPT_B64} | base64 -d | bash'
        RC=$?
        echo ">>> Production unpeer pod exited (rc=${RC})"
      register: _prod_unpeer
      changed_when: true
      failed_when: false
      when: _prod_cluster_lif | default('') != ''

    - name: Display Production unpeer output
      ansible.builtin.debug:
        var: _prod_unpeer.stdout_lines
      when: _prod_unpeer is not skipped

    - name: Remove ONTAP peering from DR FSx (running in-cluster pod)
      ansible.builtin.shell: |
        set -o pipefail
        B64=$(base64 -w0 /tmp/ontap-unpeer.sh)
        echo ">>> Launching unpeer pod on DR cluster ({{ _dr_cluster_lif }})..."
        echo ">>> This may take 1-5 minutes if peers need to be removed."
        KUBECONFIG="{{ dr_kubeconfig }}" oc run ontap-unpeer-dr \
          --rm --restart=Never --attach=true \
          --image=image-registry.openshift-image-registry.svc:5000/openshift/tools \
          --env="ONTAP_MGMT={{ _dr_cluster_lif }}" \
          --env="ONTAP_AUTH=fsxadmin:{{ fsx_admin_password }}" \
          --env="SCRIPT_B64=${B64}" \
          --overrides='{"spec":{"terminationGracePeriodSeconds":0,"activeDeadlineSeconds":300}}' \
          -- bash -c 'echo ${SCRIPT_B64} | base64 -d | bash'
        RC=$?
        echo ">>> DR unpeer pod exited (rc=${RC})"
      register: _dr_unpeer
      changed_when: true
      failed_when: false
      when: _dr_cluster_lif | default('') != ''

    - name: Display DR unpeer output
      ansible.builtin.debug:
        var: _dr_unpeer.stdout_lines
      when: _dr_unpeer is not skipped

    - name: Clean up unpeer script
      ansible.builtin.file:
        path: /tmp/ontap-unpeer.sh
        state: absent

    - name: Wait for peering removal to propagate
      ansible.builtin.pause:
        seconds: 15
      when: (_prod_cluster_lif | default('') != '') or (_dr_cluster_lif | default('') != '')

# -----------------------------------------------------------------------------
# Play: Scrub DR metadata from the AppVault S3 bucket
# -----------------------------------------------------------------------------
- name: Scrub AppVault S3 DR metadata
  hosts: localhost
  gather_facts: false
  vars:
    _project_root: "{{ playbook_dir }}/.."
  tasks:
    - name: Skip if not destroying
      ansible.builtin.meta: end_play
      when: not (destroy_resources | default(false))

    - name: Read AppVault bucket config from values-global.yaml
      ansible.builtin.shell: |
        BUCKET=$(yq '.tridentProtect.appVault.s3.bucketName // ""' {{ _project_root }}/values-global.yaml)
        REGION=$(yq '.tridentProtect.appVault.s3.region // ""' {{ _project_root }}/values-global.yaml)
        echo "${BUCKET} ${REGION}"
      register: _appvault_info
      changed_when: false

    - name: Set bucket facts
      ansible.builtin.set_fact:
        _appvault_bucket: "{{ _appvault_info.stdout.split()[0] }}"
        _appvault_region: "{{ _appvault_info.stdout.split()[1] }}"

    - name: Skip if bucket not configured
      ansible.builtin.meta: end_play
      when: _appvault_bucket == '' or _appvault_bucket == 'null'

    - name: Remove dr-metadata/ prefix from AppVault bucket
      ansible.builtin.shell: |
        set -o pipefail
        echo "Removing dr-metadata/ from s3://{{ _appvault_bucket }}..."
        aws s3 rm "s3://{{ _appvault_bucket }}/dr-metadata/" --recursive --region {{ _appvault_region }} 2>&1 || true
      register: _s3_dr_metadata
      changed_when: "'delete' in (_s3_dr_metadata.stdout | default(''))"

    - name: Remove snapshot archives from AppVault bucket
      ansible.builtin.shell: |
        set -o pipefail
        BUCKET="{{ _appvault_bucket }}"
        REGION="{{ _appvault_region }}"
        echo "Cleaning AppVault snapshot data from s3://${BUCKET}..."
        PREFIXES=$(aws s3api list-objects-v2 --bucket "${BUCKET}" --region "${REGION}" \
          --delimiter "/" --query "CommonPrefixes[].Prefix" --output text 2>/dev/null || echo "")
        if [ -z "${PREFIXES}" ] || [ "${PREFIXES}" = "None" ]; then
          echo "  Bucket is empty or inaccessible — nothing to remove"
          exit 0
        fi
        COUNT=0
        for PREFIX in ${PREFIXES}; do
          echo "  Removing s3://${BUCKET}/${PREFIX}..."
          aws s3 rm "s3://${BUCKET}/${PREFIX}" --recursive --region "${REGION}" 2>&1
          COUNT=$((COUNT + 1))
        done
        echo "Removed ${COUNT} top-level prefix(es) from AppVault bucket"
      register: _s3_appvault_clean
      changed_when: "'Removed' in (_s3_appvault_clean.stdout | default(''))"

    - name: Display S3 cleanup results
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "AppVault S3 Cleanup"
          - "=========================================="
          - "  Bucket: {{ _appvault_bucket }}"
          - "  DR metadata: {{ _s3_dr_metadata.stdout | default('skipped') }}"
          - "  AppVault data: {{ _s3_appvault_clean.stdout_lines | default(['skipped']) | last }}"
          - "=========================================="

# -----------------------------------------------------------------------------
# Play: Clean up any remaining FSx volumes via AWS API
#
# If the ONTAP REST API couldn't delete volumes (e.g. backup-protected),
# this play uses the AWS CLI as a fallback before Terraform attempts to
# destroy the SVM/filesystem.
# -----------------------------------------------------------------------------
- name: Clean up remaining FSx volumes via AWS API
  hosts: localhost
  gather_facts: false
  vars:
    _prod_fsx_name: "{{ prod_file_system_name | default(prod_cluster.cluster_name ~ '-' ~ prod_cluster.region ~ '-fsx') }}"
    _dr_fsx_name: "{{ dr_file_system_name | default(dr_cluster.cluster_name ~ '-' ~ dr_cluster.region ~ '-fsx') }}"
  tasks:
    - name: Skip if not destroying
      ansible.builtin.meta: end_play
      when: not (destroy_resources | default(false))

    - name: Look up FSx filesystem IDs by name tag
      ansible.builtin.shell: |
        set -o pipefail
        aws fsx describe-file-systems --region {{ item.region }} \
          --query "FileSystems[?Tags[?Key=='Name' && Value=='{{ item.name }}']].FileSystemId" \
          --output text 2>/dev/null | head -1
      loop:
        - name: "{{ _prod_fsx_name }}"
          region: "{{ prod_cluster.region }}"
          label: "Production"
        - name: "{{ _dr_fsx_name }}"
          region: "{{ dr_cluster.region }}"
          label: "DR"
      loop_control:
        label: "{{ item.label }}"
      register: _fsx_ids
      changed_when: false
      failed_when: false

    - name: Delete remaining non-root volumes via AWS FSx API
      ansible.builtin.shell: |
        set -o pipefail
        FS_ID="{{ item.stdout | trim }}"
        REGION="{{ item.item.region }}"
        LABEL="{{ item.item.label }}"

        if [ -z "${FS_ID}" ] || [ "${FS_ID}" = "None" ]; then
          echo "SKIP: No filesystem found for ${LABEL}"
          exit 0
        fi

        echo "=== Cleaning up volumes on ${LABEL} filesystem ${FS_ID} ==="

        VOL_IDS=$(aws fsx describe-volumes --region ${REGION} \
          --filters "Name=file-system-id,Values=${FS_ID}" \
          --query "Volumes[?OntapConfiguration.StorageVirtualMachineRoot!=\`true\`].VolumeId" \
          --output text 2>/dev/null)

        if [ -z "${VOL_IDS}" ] || [ "${VOL_IDS}" = "None" ]; then
          echo "  No non-root volumes to clean up"
          exit 0
        fi

        for VOL_ID in ${VOL_IDS}; do
          echo "  Deleting ${VOL_ID} via AWS FSx API..."
          aws fsx delete-volume --region ${REGION} \
            --volume-id ${VOL_ID} \
            --ontap-configuration '{"SkipFinalBackup":true}' 2>&1 || true
        done

        echo "  Waiting for volume deletions to propagate..."
        for i in $(seq 1 30); do
          REMAINING=$(aws fsx describe-volumes --region ${REGION} \
            --filters "Name=file-system-id,Values=${FS_ID}" \
            --query "length(Volumes[?OntapConfiguration.StorageVirtualMachineRoot!=\`true\` && Lifecycle!='DELETING' && Lifecycle!='FAILED'])" \
            --output text 2>/dev/null)
          if [ "${REMAINING}" = "0" ] || [ "${REMAINING}" = "None" ]; then
            echo "  All non-root volumes deleted or deleting"
            break
          fi
          echo "  ${REMAINING} volume(s) still active (${i}/30)..."
          sleep 10
        done
      loop: "{{ _fsx_ids.results }}"
      loop_control:
        label: "{{ item.item.label }}"
      register: _vol_cleanup
      changed_when: "'Deleting' in (item.stdout | default(''))"
      failed_when: false

    - name: Display volume cleanup results
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines | default(['(skipped)']) }}"
      loop: "{{ _vol_cleanup.results }}"
      loop_control:
        label: "{{ item.item.item.label }}"
      when: item.stdout is defined

# -----------------------------------------------------------------------------
- name: Destroy FSx ONTAP Filesystems (parallel)
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Skip if not destroying
      ansible.builtin.meta: end_play
      when: not (destroy_resources | default(false))

    # --- Load FSx password (needed for terraform.tfvars) ---
    - name: Load FSx password from ~/.fsx file
      when: fsx_admin_password is not defined or fsx_admin_password == ''
      block:
        - name: Check if ~/.fsx file exists
          ansible.builtin.stat:
            path: "{{ '~/.fsx' | expanduser }}"
          register: _fsx_file_stat

        - name: Read password from ~/.fsx file
          ansible.builtin.slurp:
            src: "{{ '~/.fsx' | expanduser }}"
          register: _fsx_file_content
          when: _fsx_file_stat.stat.exists | default(false)

        - name: Set password from ~/.fsx file
          ansible.builtin.set_fact:
            fsx_admin_password: "{{ _fsx_file_content.content | b64decode | trim }}"
            svm_admin_password: "{{ _fsx_file_content.content | b64decode | trim }}"
          when:
            - _fsx_file_stat.stat.exists | default(false)
            - _fsx_file_content.content is defined
            - fsx_admin_password is not defined or fsx_admin_password == ''

    # --- Prepare Production FSx destroy (init, plan) ---
    - name: Prepare Production FSx destroy
      ansible.builtin.include_role:
        name: fsx_ontap_terraform
      vars:
        fsx_ontap_terraform_cluster_info: "{{ prod_cluster }}"
        fsx_ontap_terraform_label: "Production FSx"
        fsx_ontap_terraform_file_system_name_override: "{{ prod_file_system_name | default('') }}"
        fsx_ontap_terraform_state_region: "{{ prod_cluster.region }}"
        fsx_ontap_terraform_state_bucket: "{{ terraform_state_bucket }}"
        fsx_ontap_terraform_state_dynamodb_table: "{{ terraform_state_dynamodb_table }}"
        fsx_ontap_terraform_svm_name: "SVM1"
        fsx_ontap_terraform_allowed_cidrs:
          - "{{ prod_cluster.vpc_cidr }}"
          - "{{ dr_cluster.vpc_cidr }}"
        fsx_ontap_terraform_tags: "{{ resource_tags }}"
        fsx_ontap_terraform_destroy: true
        fsx_ontap_terraform_prepare_only: true

    - name: Save Production FSx destroy prepared state
      ansible.builtin.set_fact:
        _prod_fsx_prepared: "{{ fsx_ontap_terraform_prepared }}"

    # --- Prepare DR FSx destroy (init, plan) ---
    - name: Prepare DR FSx destroy
      ansible.builtin.include_role:
        name: fsx_ontap_terraform
      vars:
        fsx_ontap_terraform_cluster_info: "{{ dr_cluster }}"
        fsx_ontap_terraform_label: "DR FSx"
        fsx_ontap_terraform_file_system_name_override: "{{ dr_file_system_name | default('') }}"
        fsx_ontap_terraform_state_region: "{{ prod_cluster.region }}"
        fsx_ontap_terraform_state_bucket: "{{ terraform_state_bucket }}"
        fsx_ontap_terraform_state_dynamodb_table: "{{ terraform_state_dynamodb_table }}"
        fsx_ontap_terraform_svm_name: "SVM2"
        fsx_ontap_terraform_allowed_cidrs:
          - "{{ dr_cluster.vpc_cidr }}"
          - "{{ prod_cluster.vpc_cidr }}"
        fsx_ontap_terraform_tags: "{{ resource_tags }}"
        fsx_ontap_terraform_destroy: true
        fsx_ontap_terraform_prepare_only: true

    - name: Save DR FSx destroy prepared state
      ansible.builtin.set_fact:
        _dr_fsx_prepared: "{{ fsx_ontap_terraform_prepared }}"

    # --- Destroy both in parallel ---
    - name: Display parallel destroy notice
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Destroying FSx ONTAP in PARALLEL"
          - "=========================================="
          - "  Production: {{ _prod_fsx_prepared.file_system_name }}"
          - "  DR:         {{ _dr_fsx_prepared.file_system_name }}"
          - "=========================================="

    - name: Destroy FSx ONTAP - Production (async)
      ansible.builtin.shell: "{{ _prod_fsx_prepared.apply_cmd }}"  # noqa: command-instead-of-shell
      async: 3600
      poll: 0
      register: _prod_fsx_destroy_job
      changed_when: true
      when: not (_prod_fsx_prepared.skipped | default(false))

    - name: Destroy FSx ONTAP - DR (async)
      ansible.builtin.shell: "{{ _dr_fsx_prepared.apply_cmd }}"  # noqa: command-instead-of-shell
      async: 3600
      poll: 0
      register: _dr_fsx_destroy_job
      changed_when: true
      when: not (_dr_fsx_prepared.skipped | default(false))

    # --- Wait for both to complete ---
    - name: Wait for Production FSx destroy to complete
      ansible.builtin.async_status:
        jid: "{{ _prod_fsx_destroy_job.ansible_job_id }}"
      register: _prod_fsx_destroy
      until: _prod_fsx_destroy.finished | bool
      retries: 120
      delay: 30
      when: not (_prod_fsx_prepared.skipped | default(false))

    - name: Wait for DR FSx destroy to complete
      ansible.builtin.async_status:
        jid: "{{ _dr_fsx_destroy_job.ansible_job_id }}"
      register: _dr_fsx_destroy
      until: _dr_fsx_destroy.finished | bool
      retries: 120
      delay: 30
      when: not (_dr_fsx_prepared.skipped | default(false))

    - name: Display FSx destroy completion
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "FSx ONTAP Filesystems Destroyed"
          - "  Production: {{ _prod_fsx_prepared.file_system_name }}"
          - "  DR:         {{ _dr_fsx_prepared.file_system_name }}"
          - "=========================================="

# -----------------------------------------------------------------------------
# Destroy: Route53 DR Failover
# -----------------------------------------------------------------------------
- name: Destroy Route53 DR Failover
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Skip if not destroying
      ansible.builtin.meta: end_play
      when: not (destroy_resources | default(false))

    - name: Skip if no failover domain configured
      ansible.builtin.meta: end_play
      when: dr_failover_domain | default('') == ''

    - name: Discover primary cluster ingress hostname
      ansible.builtin.shell: >-
        KUBECONFIG="{{ prod_kubeconfig }}" oc get ingress.config cluster
        -o jsonpath='{.spec.domain}'
      register: _prod_ingress_domain_destroy
      changed_when: false
      failed_when: false

    - name: Discover secondary cluster ingress hostname
      ansible.builtin.shell: >-
        KUBECONFIG="{{ dr_kubeconfig }}" oc get ingress.config cluster
        -o jsonpath='{.spec.domain}'
      register: _dr_ingress_domain_destroy
      changed_when: false
      failed_when: false

    - name: Destroy Route53 failover via Terraform
      ansible.builtin.include_role:
        name: route53_failover_terraform
      vars:
        route53_failover_domain: "{{ dr_failover_domain }}"
        route53_failover_create_hosted_zone: "{{ not (dr_failover_hosted_zone_id | default('') | length > 0) }}"
        route53_failover_hosted_zone_id: "{{ dr_failover_hosted_zone_id | default('') }}"
        route53_failover_state_bucket: "{{ terraform_state_bucket }}"
        route53_failover_state_region: "{{ prod_cluster.region }}"
        route53_failover_state_dynamodb_table: "{{ terraform_state_dynamodb_table }}"
        route53_failover_primary_ingress_hostname: "router-default.{{ _prod_ingress_domain_destroy.stdout | default('placeholder.example.com') }}"
        route53_failover_secondary_ingress_hostname: "router-default.{{ _dr_ingress_domain_destroy.stdout | default('placeholder.example.com') }}"
        route53_failover_primary_health_fqdn: "router-default.{{ _prod_ingress_domain_destroy.stdout | default('placeholder.example.com') }}"
        route53_failover_secondary_health_fqdn: "router-default.{{ _dr_ingress_domain_destroy.stdout | default('placeholder.example.com') }}"
        route53_failover_apps: "{{ dr_failover_apps | default([]) }}"
        route53_failover_attach_secondary_health_check: "{{ dr_failover_attach_secondary_health_check | default(false) | bool }}"
        route53_failover_tags: "{{ resource_tags }}"
        route53_failover_destroy: true

- name: Destroy VPC Peering
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Skip if not destroying
      ansible.builtin.meta: end_play
      when: not (destroy_resources | default(false))

    - name: Destroy VPC peering via Terraform
      ansible.builtin.include_role:
        name: vpc_peering_terraform
      vars:
        vpc_peering_terraform_state_bucket: "{{ terraform_state_bucket }}"
        vpc_peering_terraform_state_dynamodb_table: "{{ terraform_state_dynamodb_table }}"
        vpc_peering_terraform_tags: "{{ resource_tags }}"
        vpc_peering_terraform_destroy: true

- name: Destruction Summary
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Skip if not destroying
      ansible.builtin.meta: end_play
      when: not (destroy_resources | default(false))

    - name: Display destruction summary
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - "  NetApp DR Infrastructure - Destruction Complete"
          - "============================================================"
          - "  Production FSx: Destroyed"
          - "  DR FSx: Destroyed"
          - "  VPC Peering: Destroyed"
          - "  Terraform State: {{ terraform_state_bucket }} (PRESERVED)"
          - ""
          - "  To also destroy the state backend:"
          - "    make destroy-terraform-state"
          - "============================================================"
