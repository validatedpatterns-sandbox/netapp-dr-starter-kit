# Ignores are in .trivyignore
scan:
  scanners:
    - vuln
    - secret
    - config
  severities:
    - MEDIUM
    - CRITICAL
    - HIGH
  # Legacy Terraform modules: starter defaults trip many AWS hardening rules; Crossplane is the primary path.
  skip-dirs:
    - terraform/fsx-ontap
    - terraform/terraform-state
