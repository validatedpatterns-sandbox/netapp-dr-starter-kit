apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: wordpress
  labels:
    app.kubernetes.io/name: wordpress
spec:
  to:
    kind: Service
    name: wordpress
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
