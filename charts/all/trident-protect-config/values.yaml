# Default values for trident-protect-config
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# When true (DR spoke only), bundle WordPress and Boutique as subcharts so workload
# manifests exist without separate Argo CD Applications for those charts.
drSpokeWorkloads:
  enabled: false

# ExternalSecret Configuration
secretStoreRef:
  name: vault-backend
  kind: ClusterSecretStore

# Datamover eso secret config
kopiaSecret:
  name: trident-protect-kopia-password
  vaultKey: secret/data/global/datamover
  property: KOPIA_PASSWORD

# tridentFSX values are populated by make build-dr and merged from
# values-hub.yaml / values-secondary.yaml via the Validated Patterns framework.
tridentFSX:
  mgmtLIF: ""
  clusterLIF: ""
  svm: ""
  interclusterIPs: []
  peer:
    mgmtLIF: ""
    clusterLIF: ""
    svm: ""
    interclusterIPs: []

# Trident Protect AppVault configuration
tridentProtect:
  # AppVault for S3-compatible storage (AWS S3, ONTAP-S3, etc.)
  appVault:
    enabled: true
    name: aws-s3-appvault
    # Type: AWS, Azure, GCP, S3, ONTAP-S3, StorageGRID-S3, Generic-S3
    providerType: AWS
    # Credentials from Vault
    credentials:
      # Vault path for ExternalSecret
      vaultPath: secret/data/global/aws
      secretName: trident-protect-s3-creds
    # S3 configuration (used for all S3-compatible providers including AWS)
    # bucketName and region are set in values-global.yaml (.tridentProtect.appVault.s3)
    s3:
      bucketName: ""
      region: ""
      endpointURL: amazonaws.com

  # ONTAP cluster and SVM peering (runs as a CronJob for self-healing)
  ontapPeering:
    enabled: true
    # role: initiator (hub) creates peers first; acceptor (secondary) follows
    role: initiator
    image: image-registry.openshift-image-registry.svc:5000/openshift/tools
    secretName: ontap-cluster-admin-creds
    vaultKey: secret/data/global/fsx-cluster-admin

  # SnapMirror health check (detects and fixes intra-cluster SnapMirrors)
  snapmirrorHealth:
    enabled: true
    schedule: "*/5 * * * *"

  # Applications to protect
  # Each application can include one or more namespaces
  applications: []
  # Example:
  # applications:
  #   - name: my-app
  #     namespaces:
  #       - name: my-app-namespace
  #       - name: my-app-database
  #         labelSelector:
  #           matchLabels:
  #             app: postgres

  # AMR PostSync hook configuration
  # The PostSync hook patches sourceApplicationUID after ArgoCD syncs
  amrPostSync:
    image: image-registry.openshift-image-registry.svc:5000/crossplane-system/dr-tools:latest

  # AppMirrorRelationships for DR replication
  # Created declaratively by Helm; sourceApplicationUID is patched by a
  # PostSync hook after the Application resource exists.
  appMirrorRelationships: []
  # Example:
  # appMirrorRelationships:
  #   - name: my-app-mirror
  #     desiredState: Established  # Established or Promoted
  #     sourceAppVaultRef: s3-appvault
  #     destinationAppVaultRef: s3-appvault
  #     sourceApplicationName: my-app
  #     recurrenceRule: "DTSTART:20240101T000000Z\nRRULE:FREQ=HOURLY;INTERVAL=1"
  #     storageClassName: trident-csi  # Optional
  #     namespaceMapping:  # Optional - map source to destination namespaces
  #       - source: my-app-namespace
  #         destination: my-app-namespace-dr

  # Schedules for automated snapshots and backups
  schedules: []
  # Example:
  # schedules:
  #   - name: my-app-hourly
  #     applicationRef: my-app
  #     appVaultRef: s3-appvault
  #     granularity: Hourly  # Hourly, Daily, Weekly, Monthly, Custom
  #     minute: "0"
  #     snapshotRetention: "24"  # Keep 24 snapshots
  #     backupRetention: "7"     # Keep 7 backups
  #     enabled: true

  # On-demand snapshots (typically not used in GitOps - use schedules instead)
  snapshots: []

  # On-demand backups (typically not used in GitOps - use schedules instead)
  backups: []

# Route53 DR Failover Routes
# When enabled, creates OpenShift Routes in each app namespace with the
# DR failover domain hostname (e.g. boutique.dr.example.com). Route53
# points these hostnames to the active cluster's ingress.
# DR-only: publish AppMirrorRelationship desiredState to S3 for hub Route53 reconciler.
drDnsStateExport:
  enabled: false
  schedule: "*/1 * * * *"
  s3Key: dr-metadata/amr-dns-target.json

drFailover:
  enabled: false
  domain: ""
  apps: []
  # Example:
  # apps:
  #   - name: boutique
  #     routeName: frontend-dr
  #     namespace: boutique
  #     serviceName: frontend
  #     servicePort: http
  #   - name: wordpress
  #     routeName: wordpress-dr
  #     namespace: wordpress
  #     serviceName: wordpress
  #     servicePort: http
