{{- if .Values.tridentProtect.ontapPeering.enabled }}
{{- $role := .Values.tridentProtect.ontapPeering.role | default "initiator" }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ontap-peering
  namespace: trident-protect
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  {{- if eq $role "acceptor" }}
  schedule: "2-58/4 * * * *"
  {{- else }}
  schedule: "*/4 * * * *"
  {{- end }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 120
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: ontap-peering
              image: {{ .Values.tridentProtect.ontapPeering.image }}
              command: ["/bin/bash", "-c"]
              args:
                - |
                  ONTAP_USER=$(cat /credentials/username)
                  ONTAP_PASS=$(cat /credentials/password)
                  AUTH="${ONTAP_USER}:${ONTAP_PASS}"

                  # Read endpoints from ConfigMap (populated by fsx-endpoint-watcher)
                  # Fall back to Helm values for backward compatibility
                  if [ -f /fsx-endpoints/LOCAL_CLUSTER_LIF ] && [ -s /fsx-endpoints/LOCAL_CLUSTER_LIF ]; then
                    LOCAL_CLUSTER_MGMT=$(cat /fsx-endpoints/LOCAL_CLUSTER_LIF)
                    LOCAL_SVM=$(cat /fsx-endpoints/LOCAL_SVM)
                    REMOTE_SVM=$(cat /fsx-endpoints/PEER_SVM)
                    REMOTE_IC_IPS=$(cat /fsx-endpoints/PEER_IC_IPS)
                  else
                    LOCAL_CLUSTER_MGMT="{{ .Values.tridentFSX.clusterLIF }}"
                    LOCAL_SVM="{{ .Values.tridentFSX.svm }}"
                    REMOTE_SVM="{{ .Values.tridentFSX.peer.svm }}"
                    REMOTE_IC_IPS='{{ .Values.tridentFSX.peer.interclusterIPs | toJson }}'
                  fi
                  ROLE="{{ $role }}"

                  if [ -z "${LOCAL_CLUSTER_MGMT}" ]; then
                    echo "No cluster LIF available yet (ConfigMap not populated) — will retry"
                    exit 0
                  fi

                  api() {
                    curl -sk -u "${AUTH}" -H "Content-Type: application/json" "$@"
                  }

                  echo "=== ONTAP Peering Reconcile ($(date -u +%H:%M:%S)) role=${ROLE} ==="
                  echo "  Local: ${LOCAL_CLUSTER_MGMT} / ${LOCAL_SVM}"
                  echo "  Remote SVM: ${REMOTE_SVM}"

                  # ---- Connectivity check ----
                  HTTP=$(curl -sk -o /dev/null -w '%{http_code}' --connect-timeout 5 \
                    -u "${AUTH}" "https://${LOCAL_CLUSTER_MGMT}/api/cluster" 2>/dev/null || echo "000")
                  if [ "${HTTP}" = "000" ] || [ "${HTTP}" -ge 400 ]; then
                    echo "Cannot reach ONTAP API (HTTP ${HTTP}) — will retry next schedule"
                    exit 0
                  fi

                  # ---- Cluster peering ----
                  PEERS=$(api "https://${LOCAL_CLUSTER_MGMT}/api/cluster/peers?fields=status,name,uuid,authentication")
                  PEER_COUNT=$(echo "${PEERS}" | jq '.num_records // 0')

                  if [ "${PEER_COUNT}" -gt 0 ]; then
                    PEER_STATE=$(echo "${PEERS}" | jq -r '.records[0].status.state // "unknown"')
                    PEER_UUID=$(echo "${PEERS}" | jq -r '.records[0].uuid // empty')
                    PEER_NAME=$(echo "${PEERS}" | jq -r '.records[0].name // empty')
                    AUTH_STATE=$(echo "${PEERS}" | jq -r '.records[0].authentication.state // "unknown"')
                    echo "Cluster peer exists: ${PEER_NAME} (${PEER_STATE}, auth=${AUTH_STATE})"

                    if [ "${PEER_STATE}" = "unavailable" ]; then
                      echo "  Peer unavailable — deleting stale peer for recreation"
                      api -X DELETE "https://${LOCAL_CLUSTER_MGMT}/api/cluster/peers/${PEER_UUID}" >/dev/null 2>&1
                      echo "  Deleted — will recreate next schedule"
                      exit 0
                    fi

                    if [ "${PEER_STATE}" != "available" ]; then
                      echo "  Peer not yet available (${PEER_STATE}) — will retry next schedule"
                      exit 0
                    fi
                  else
                    PASSPHRASE="${ONTAP_PASS}"
                    echo "Creating cluster peer..."
                    RESP=$(api -X POST "https://${LOCAL_CLUSTER_MGMT}/api/cluster/peers" \
                      -d "{\"remote\":{\"ip_addresses\":${REMOTE_IC_IPS}},\"authentication\":{\"passphrase\":\"${PASSPHRASE}\"}}" \
                      -w "\n%{http_code}" 2>/dev/null)
                    HTTP=$(echo "${RESP}" | tail -1)
                    BODY=$(echo "${RESP}" | sed '$d')
                    echo "  HTTP ${HTTP}"
                    if [ "${HTTP}" -ge 400 ]; then
                      echo "  Error: $(echo "${BODY}" | jq -r '.error.message // "unknown"')"
                      echo "  Will retry next schedule"
                      exit 0
                    fi
                    echo "  Cluster peer created — waiting for remote side on next schedule"
                    exit 0
                  fi

                  # ---- SVM peering ----
                  SVM_PEERS=$(api "https://${LOCAL_CLUSTER_MGMT}/api/svm/peers?fields=state,svm,peer,name,uuid")
                  SVM_PEER_COUNT=$(echo "${SVM_PEERS}" | jq '.num_records // 0')
                  echo "SVM peers found: ${SVM_PEER_COUNT}"

                  if [ "${SVM_PEER_COUNT}" -gt 0 ]; then
                    SVM_STATE=$(echo "${SVM_PEERS}" | jq -r '.records[0].state // "unknown"')
                    SVM_UUID=$(echo "${SVM_PEERS}" | jq -r '.records[0].uuid // empty')
                    SVM_PEER_NAME=$(echo "${SVM_PEERS}" | jq -r '.records[0].name // empty')
                    SVM_LOCAL=$(echo "${SVM_PEERS}" | jq -r '.records[0].svm.name // empty')
                    SVM_REMOTE=$(echo "${SVM_PEERS}" | jq -r '.records[0].peer.svm.name // empty')
                    echo "SVM peer: name=${SVM_PEER_NAME} local=${SVM_LOCAL} remote=${SVM_REMOTE} state=${SVM_STATE}"

                    if [ "${SVM_STATE}" = "peered" ]; then
                      echo "=== Peering fully established ==="
                      exit 0
                    fi

                    if [ "${SVM_STATE}" = "pending" ]; then
                      echo "  Accepting pending SVM peer..."
                      RESP=$(api -X PATCH "https://${LOCAL_CLUSTER_MGMT}/api/svm/peers/${SVM_UUID}" \
                        -d "{\"state\":\"peered\"}" -w "\n%{http_code}" 2>/dev/null)
                      HTTP=$(echo "${RESP}" | tail -1)
                      BODY=$(echo "${RESP}" | sed '$d')
                      echo "  HTTP ${HTTP}"
                      if [ "${HTTP}" -ge 400 ]; then
                        echo "  Error: $(echo "${BODY}" | jq -r '.error.message // "unknown"')"
                      fi
                      exit 0
                    fi

                    if [ "${SVM_STATE}" = "initiated" ]; then
                      echo "  SVM peer initiated — waiting for remote to accept"
                      exit 0
                    fi

                    echo "  Unexpected SVM peer state: ${SVM_STATE}"
                    exit 0
                  fi

                  if [ "${SVM_PEER_COUNT}" -eq 0 ] && [ "${ROLE}" = "initiator" ]; then
                    echo "Creating SVM peer: ${LOCAL_SVM} <-> ${REMOTE_SVM}..."
                    PAYLOAD="{\"svm\":{\"name\":\"${LOCAL_SVM}\"},\"peer\":{\"cluster\":{\"uuid\":\"${PEER_UUID}\"},\"svm\":{\"name\":\"${REMOTE_SVM}\"}},\"applications\":[\"snapmirror\"]}"
                    echo "  Payload: ${PAYLOAD}"
                    RESP=$(api -X POST "https://${LOCAL_CLUSTER_MGMT}/api/svm/peers" \
                      -d "${PAYLOAD}" \
                      -w "\n%{http_code}" 2>/dev/null)
                    HTTP=$(echo "${RESP}" | tail -1)
                    BODY=$(echo "${RESP}" | sed '$d')
                    echo "  HTTP ${HTTP}"
                    if [ "${HTTP}" -ge 400 ]; then
                      echo "  Error: $(echo "${BODY}" | jq -r '.error.message // "unknown"')"
                      echo "  Full response: ${BODY}"
                      exit 0
                    fi
                    if [ "${HTTP}" = "202" ]; then
                      JOB_UUID=$(echo "${BODY}" | jq -r '.job.uuid // empty')
                      if [ -n "${JOB_UUID}" ]; then
                        echo "  Async job ${JOB_UUID} started — will verify next schedule"
                      fi
                    fi
                    exit 0
                  fi

                  if [ "${SVM_PEER_COUNT}" -eq 0 ] && [ "${ROLE}" = "acceptor" ]; then
                    echo "  No SVM peers yet — waiting for initiator to create"
                    exit 0
                  fi

                  echo "=== Reconcile complete ==="
              volumeMounts:
                - name: ontap-creds
                  mountPath: /credentials
                  readOnly: true
                - name: fsx-endpoints
                  mountPath: /fsx-endpoints
                  readOnly: true
          volumes:
            - name: ontap-creds
              secret:
                secretName: {{ .Values.tridentProtect.ontapPeering.secretName }}
            - name: fsx-endpoints
              configMap:
                name: fsx-endpoints
                optional: true
{{- end }}
