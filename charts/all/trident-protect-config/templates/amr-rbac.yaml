{{- $hasAMR := and .Values.tridentProtect.appMirrorRelationships (gt (len .Values.tridentProtect.appMirrorRelationships) 0) }}
{{- $hasApps := and .Values.tridentProtect.applications (gt (len .Values.tridentProtect.applications) 0) }}
{{- if or $hasAMR $hasApps }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trident-protect-amr-reconcile
  namespace: trident-protect
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trident-protect-amr-reconcile
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: ["protect.trident.netapp.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
  - apiGroups: ["protect.trident.netapp.io"]
    resources: ["appmirrorrelationships"]
    verbs: ["get", "list", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trident-protect-amr-reconcile
  annotations:
    argocd.argoproj.io/sync-wave: "5"
subjects:
  - kind: ServiceAccount
    name: trident-protect-amr-reconcile
    namespace: trident-protect
roleRef:
  kind: ClusterRole
  name: trident-protect-amr-reconcile
  apiGroup: rbac.authorization.k8s.io
{{- range .Values.tridentProtect.applications }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: amr-reconcile-tenant
  namespace: {{ (index .namespaces 0).name }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
subjects:
  - kind: ServiceAccount
    name: trident-protect-amr-reconcile
    namespace: trident-protect
roleRef:
  kind: ClusterRole
  name: trident-protect-tenant-cluster-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- if $hasAMR }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: amr-reconcile-appvault-reader
  namespace: trident-protect
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: ["protect.trident.netapp.io"]
    resources: ["appvaults"]
    resourceNames:
      {{- range .Values.tridentProtect.appMirrorRelationships }}
      - {{ .sourceAppVaultRef | quote }}
      - {{ .destinationAppVaultRef | quote }}
      {{- end }}
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: amr-reconcile-appvault-reader
  namespace: trident-protect
  annotations:
    argocd.argoproj.io/sync-wave: "5"
subjects:
  - kind: ServiceAccount
    name: trident-protect-amr-reconcile
    namespace: trident-protect
roleRef:
  kind: Role
  name: amr-reconcile-appvault-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
