{{- /* Hub only: secondary clusters define AppMirrorRelationships and must not overwrite S3. */ -}}
{{- $amrs := .Values.tridentProtect.appMirrorRelationships | default list }}
{{- if and .Values.tridentProtect.applications (gt (len .Values.tridentProtect.applications) 0) (eq (len $amrs) 0) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: amr-uid-publish-script
  namespace: trident-protect
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
data:
  publish.py: |
    #!/usr/bin/env python3
    """Publish local Application UIDs to S3 for cross-cluster AMR consumption."""
    import json, os, sys, time, ssl, subprocess
    import urllib.request, urllib.error

    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    API = "https://kubernetes.default.svc"
    APPS = json.loads(os.environ.get("APP_DEFINITIONS", "[]"))
    BUCKET = os.environ["S3_BUCKET"]
    REGION = os.environ["S3_REGION"]
    S3_KEY = "dr-metadata/application-uids.json"
    MAX_RETRIES = 6
    RETRY_DELAY = 10

    CTX = ssl.create_default_context()
    CTX.check_hostname = False
    CTX.verify_mode = ssl.CERT_NONE

    def kube_get(path):
        token = open(TOKEN_PATH).read().strip()
        req = urllib.request.Request(
            f"{API}{path}",
            headers={"Authorization": f"Bearer {token}"},
        )
        try:
            return json.loads(urllib.request.urlopen(req, context=CTX).read())
        except urllib.error.HTTPError as e:
            print(f"  API error {e.code}: {e.read().decode()}", file=sys.stderr)
            return None

    print("=== AMR UID Publisher ===")

    for attempt in range(MAX_RETRIES):
        uids = {}
        missing = []
        for app in APPS:
            name = app["name"]
            ns = app["namespaces"][0]["name"]
            data = kube_get(
                f"/apis/protect.trident.netapp.io/v1/namespaces/{ns}/applications/{name}"
            )
            if data and "metadata" in data:
                uids[name] = {"uid": data["metadata"]["uid"], "namespace": ns}
                print(f"  {name}: {uids[name]['uid']}")
            else:
                missing.append(name)
                print(f"  {name}: not found yet")

        if not missing:
            break
        if attempt < MAX_RETRIES - 1:
            print(f"  Waiting {RETRY_DELAY}s for: {missing}")
            time.sleep(RETRY_DELAY)

    if not uids:
        print("ERROR: No Application UIDs found")
        sys.exit(1)

    with open("/tmp/uids.json", "w") as f:
        json.dump({"applicationUIDs": uids}, f, indent=2)

    r = subprocess.run(
        ["aws", "s3", "cp", "/tmp/uids.json",
         f"s3://{BUCKET}/{S3_KEY}", "--region", REGION],
        capture_output=True, text=True,
    )
    if r.returncode != 0:
        print(f"S3 upload failed: {r.stderr}", file=sys.stderr)
        sys.exit(1)

    print(f"Published {len(uids)} UID(s) to s3://{BUCKET}/{S3_KEY}")
---
apiVersion: batch/v1
kind: Job
metadata:
  name: amr-uid-publish
  namespace: trident-protect
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: trident-protect-amr-reconcile
      containers:
        - name: publish
          image: {{ .Values.tridentProtect.amrPostSync.image | default "image-registry.openshift-image-registry.svc:5000/crossplane-system/dr-tools:latest" }}
          command: ["python3", "/scripts/publish.py"]
          env:
            - name: APP_DEFINITIONS
              value: {{ .Values.tridentProtect.applications | toJson | quote }}
            - name: S3_BUCKET
              value: {{ .Values.tridentProtect.appVault.s3.bucketName | quote }}
            - name: S3_REGION
              value: {{ .Values.tridentProtect.appVault.s3.region | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tridentProtect.appVault.credentials.secretName }}
                  key: accessKeyID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tridentProtect.appVault.credentials.secretName }}
                  key: secretAccessKey
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: amr-uid-publish-script
            items:
              - key: publish.py
                path: publish.py
{{- end }}
