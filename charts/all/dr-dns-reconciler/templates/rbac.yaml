{{- if .Values.drDnsReconciler.enabled }}
{{- $c := .Values.drDnsReconciler }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dr-dns-reconciler-aws-secret
  namespace: {{ $c.namespace }}
  labels:
    {{- include "dr-dns-reconciler.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ $c.awsCredentialsSecret.name | quote }}
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dr-dns-reconciler-aws-secret
  namespace: {{ $c.namespace }}
  labels:
    {{- include "dr-dns-reconciler.labels" $ | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: dr-dns-reconciler
    namespace: {{ $c.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dr-dns-reconciler-aws-secret
{{- end }}
