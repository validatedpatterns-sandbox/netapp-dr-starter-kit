{{- if .Values.drMonitoring.ksmCRS.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dr-ksm-custom-resource
  namespace: openshift-monitoring
  labels:
    app.kubernetes.io/name: dr-ksm-custom-resource
    app.kubernetes.io/component: metrics
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dr-ksm-custom-resource
  labels:
    app.kubernetes.io/name: dr-ksm-custom-resource
    app.kubernetes.io/component: metrics
rules:
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - list
      - watch
  - apiGroups:
      - protect.trident.netapp.io
    resources:
      - appmirrorrelationships
      - snapshots
      - appvaults
      - schedules
      - appmirrorupdates
    verbs:
      - list
      - watch
  - apiGroups:
      - trident.netapp.io
    resources:
      - tridentmirrorrelationships
    verbs:
      - list
      - watch
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dr-ksm-custom-resource
  labels:
    app.kubernetes.io/name: dr-ksm-custom-resource
    app.kubernetes.io/component: metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dr-ksm-custom-resource
subjects:
  - kind: ServiceAccount
    name: dr-ksm-custom-resource
    namespace: openshift-monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dr-ksm-custom-resource
  namespace: openshift-monitoring
  labels:
    app.kubernetes.io/name: dr-ksm-custom-resource
    app.kubernetes.io/component: metrics
spec:
  replicas: {{ .Values.drMonitoring.ksmCRS.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: dr-ksm-custom-resource
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dr-ksm-custom-resource
        app.kubernetes.io/component: metrics
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/ksm-custom-resource-state.yaml") . | sha256sum }}
    spec:
      serviceAccountName: dr-ksm-custom-resource
      automountServiceAccountToken: true
      containers:
        - name: kube-state-metrics
          image: {{ .Values.drMonitoring.ksmCRS.image }}
          args:
            - --custom-resource-state-only
            - --custom-resource-state-config-file=/config/custom-resource-state.yaml
            - --port=8080
            - --telemetry-port=8081
          ports:
            - name: http-metrics
              containerPort: 8080
              protocol: TCP
            - name: telemetry
              containerPort: 8081
              protocol: TCP
          volumeMounts:
            - name: crs-config
              mountPath: /config
              readOnly: true
          resources:
            {{- toYaml .Values.drMonitoring.ksmCRS.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http-metrics
            initialDelaySeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http-metrics
            initialDelaySeconds: 5
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      volumes:
        - name: crs-config
          configMap:
            name: dr-custom-resource-state
---
apiVersion: v1
kind: Service
metadata:
  name: dr-ksm-custom-resource
  namespace: openshift-monitoring
  labels:
    app.kubernetes.io/name: dr-ksm-custom-resource
    app.kubernetes.io/component: metrics
spec:
  ports:
    - name: http-metrics
      port: 8080
      targetPort: http-metrics
      protocol: TCP
    - name: telemetry
      port: 8081
      targetPort: telemetry
      protocol: TCP
  selector:
    app.kubernetes.io/name: dr-ksm-custom-resource
  type: ClusterIP
{{- end }}
